<title>Postventa · Sistema Inmobiliario</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--g50:#f8fafc;--g100:#f1f5f9;--g200:#e2e8f0;--g300:#cbd5e1;--g400:#94a3b8;--g500:#64748b;--g600:#475569;--g700:#334155;--g800:#1e293b;--g900:#0f172a;--b50:#eff6ff;--b100:#dbeafe;--b200:#bfdbfe;--b500:#3b82f6;--b600:#2563eb;--b700:#1d4ed8;--green:#10b981;--greenbg:#ecfdf5;--gb:rgba(16,185,129,.2);--red:#ef4444;--redbg:#fef2f2;--rb:rgba(239,68,68,.2);--gold:#f59e0b;--goldbg:#fffbeb;--yb:rgba(245,158,11,.2);--purple:#8b5cf6;--r:12px;--bg:#f8fafc;--cd:#fff;--cd2:#f1f5f9;--brd:var(--g200);--tx:var(--g800);--sub:var(--g500);--hdr:rgba(255,255,255,.97)}
body.dark{--g50:#1e293b;--g100:#1e2a3a;--g200:#334155;--g300:#475569;--g400:#64748b;--g500:#94a3b8;--g600:#cbd5e1;--g700:#e2e8f0;--g800:#f1f5f9;--g900:#f8fafc;--b50:#172554;--b100:#1e3a5f;--b200:#1e40af;--greenbg:#064e3b;--gb:rgba(16,185,129,.35);--redbg:#450a0a;--rb:rgba(239,68,68,.35);--goldbg:#451a03;--yb:rgba(245,158,11,.35);--bg:#0f172a;--cd:#1e293b;--cd2:#1a2332;--brd:#334155;--tx:#f1f5f9;--sub:#94a3b8;--hdr:rgba(15,23,42,.97)}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}button{font-family:inherit;cursor:pointer}input,select,textarea{font-family:inherit}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--g300);border-radius:3px}

.ib{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--brd);background:var(--cd2);font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--tx);position:relative}.ib:hover{border-color:var(--b500)}.bdg{position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;font-size:8px;font-weight:800;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px}
.up span{font-size:10px;font-weight:700;color:var(--b700);padding:3px 10px;background:var(--b50);border:1px solid var(--b200);border-radius:14px}

.bell-w{position:relative}.bell-dd{position:absolute;top:calc(100% + 6px);right:0;width:300px;background:var(--cd);border:1.5px solid var(--brd);border-radius:12px;box-shadow:0 12px 40px rgba(0,0,0,.2);z-index:150;display:none;overflow:hidden}.bell-dd.show{display:block}.bell-hd{padding:10px 14px;border-bottom:1px solid var(--brd);font-size:12px;font-weight:800}.bell-ls{max-height:260px;overflow-y:auto}.bell-it{padding:10px 14px;border-bottom:1px solid var(--g100);font-size:10px;cursor:pointer}.bell-it:hover{background:var(--cd2)}.bell-it:last-child{border:none}.bell-it .bt2{font-weight:700;font-size:10px}.bell-it .bd2{color:var(--sub);font-size:9px;margin-top:1px}.bell-it .bf{color:var(--g400);font-size:8px;margin-top:2px}.bell-emp{padding:20px;text-align:center;color:var(--sub);font-size:11px}
@media(max-width:640px){.bell-dd{position:fixed;top:58px;left:8px;right:8px;width:auto}}
/* SIDEBAR */

.mi{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:8px;font-size:13px;font-weight:600;color:var(--tx);border:none;background:none;width:calc(100% - 16px);text-align:left;margin:2px 8px}.mi:hover{background:var(--b50);color:var(--b700)}.mi.act{background:var(--b600);color:#fff}.mi .mic{font-size:15px;width:20px;text-align:center}
.mdv{height:1px;background:var(--brd);margin:6px 12px}.mu{padding:12px;border-top:1px solid var(--brd);display:flex;align-items:center;gap:8px;margin-top:auto}.mun{font-size:11px;font-weight:700}.mur{font-size:8px;color:var(--sub);text-transform:uppercase;letter-spacing:1px}.mlo{font-size:10px;color:var(--red);font-weight:700;border:none;background:none;padding:4px 8px;border-radius:5px;margin-left:auto}.mlo:hover{background:var(--redbg)}
.sec{display:none;max-width:1300px;margin:0 auto;padding:12px 14px 80px}.sec.act{display:block}

.ffi{width:100%;padding:9px 11px;border:2px solid var(--brd);border-radius:8px;font-size:12px;font-family:inherit;color:var(--tx);background:var(--cd)}.ffi:focus{outline:none;border-color:var(--b500)}.ffl{display:block;font-size:8px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--sub);margin-bottom:4px}.ffr{color:var(--gold)}.ff{margin-bottom:10px}.ffg{display:grid;grid-template-columns:1fr 1fr;gap:8px}

.pw{overflow-x:auto;padding:10px 0}.pipe{display:flex;gap:8px;min-width:max-content}.pcol{width:210px;min-width:210px;background:var(--cd2);border:1px solid var(--brd);border-radius:var(--r);flex-shrink:0;max-height:calc(100vh - 240px);display:flex;flex-direction:column}.pch{padding:8px 10px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between}.pct{font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:1px}.pcc{font-size:9px;font-weight:800;background:var(--cd);padding:2px 7px;border-radius:8px;color:var(--sub)}.pcb{padding:5px;overflow-y:auto;flex:1;min-height:40px}.pkc{background:var(--cd);border:1.5px solid var(--brd);border-radius:8px;padding:8px;margin-bottom:5px;cursor:pointer;transition:all .15s;font-size:10px}.pkc:hover{border-color:var(--b500)}
.pcol.c-rep .pch{background:rgba(59,130,246,.06)}.pcol.c-rep .pct{color:var(--b600)}.pcol.c-val .pch{background:rgba(139,92,246,.06)}.pcol.c-val .pct{color:var(--purple)}.pcol.c-asi .pch{background:rgba(245,158,11,.06)}.pcol.c-asi .pct{color:var(--gold)}.pcol.c-cam .pch{background:rgba(245,158,11,.12)}.pcol.c-cam .pct{color:#d97706}.pcol.c-eje .pch{background:rgba(6,182,212,.08)}.pcol.c-eje .pct{color:#0891b2}.pcol.c-com .pch{background:rgba(16,185,129,.08)}.pcol.c-com .pct{color:var(--green)}

.urg{display:inline-flex;padding:2px 6px;border-radius:8px;font-size:8px;font-weight:800}.urg.emer{background:var(--redbg);color:var(--red);border:1px solid var(--rb);animation:pulse 1.5s infinite}.urg.urge{background:var(--goldbg);color:#92400e;border:1px solid var(--yb)}.urg.prog{background:var(--b50);color:var(--b700);border:1px solid var(--b200)}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

.ticket-num{font-family:'Fraunces',serif;font-size:10px;font-weight:800;color:var(--b600);background:var(--b50);border:1px solid var(--b200);padding:2px 7px;border-radius:5px}
/* STATS */
.dg{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:6px;margin-bottom:12px}.dc{background:var(--cd);border:1px solid var(--brd);border-radius:9px;padding:12px;text-align:center}.dn2{font-family:'Fraunces',serif;font-size:22px;font-weight:700;color:var(--b700)}.dl{font-size:8px;color:var(--sub);margin-top:2px;text-transform:uppercase;letter-spacing:1px}

.cli{background:var(--cd);border:1px solid var(--brd);border-radius:9px;padding:10px;margin-bottom:5px;display:flex;gap:8px;align-items:center;cursor:pointer;transition:all .15s}.cli:hover{border-color:var(--b500)}.cli-ico{font-size:18px;flex-shrink:0;width:26px;text-align:center}.cli-info{flex:1;min-width:0}.cli-t{font-size:11px;font-weight:700}.cli-s{font-size:9px;color:var(--sub);margin-top:1px}.cli-r{text-align:right;flex-shrink:0}
/* MODAL */
.mo{position:fixed;inset:0;z-index:300;background:rgba(15,23,42,.6);backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center;padding:0;animation:fi .2s}@media(min-width:641px){.mo{align-items:center;padding:16px}}@keyframes fi{from{opacity:0}to{opacity:1}}.mb2{background:var(--cd);border-radius:16px 16px 0 0;width:100%;max-width:540px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 -8px 40px rgba(0,0,0,.3);animation:su .25s}@media(min-width:641px){.mb2{border-radius:14px;max-height:85vh}}@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}.m-handle{width:40px;height:5px;background:var(--g300);border-radius:3px;margin:10px auto 4px}@media(min-width:641px){.m-handle{display:none}}.mhd2{padding:10px 14px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;gap:6px;flex-shrink:0}.mtt{font-family:'Fraunces',serif;font-size:15px;font-weight:700}.msb2{font-size:10px;color:var(--sub);margin-top:1px}.mcl3{min-width:34px;height:34px;border-radius:8px;border:2px solid var(--brd);background:var(--cd2);font-size:15px;display:flex;align-items:center;justify-content:center;color:var(--sub);flex-shrink:0}.mcl3:hover{background:var(--redbg);color:var(--red)}.mbd2{padding:12px 14px 20px;overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}
.msc{margin-bottom:10px}.msct{font-size:8px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--g400);margin-bottom:5px;padding-bottom:3px;border-bottom:1px solid var(--g100)}.mgr{display:grid;grid-template-columns:1fr 1fr;gap:5px}.mf{background:var(--cd2);border:1px solid var(--brd);border-radius:7px;padding:7px 9px}.mfl{font-size:7px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--g400);margin-bottom:1px}.mfv{font-size:11px;font-weight:600}.mf.ful{grid-column:1/-1}

.emp{text-align:center;padding:28px 14px;background:var(--cd);border:1px solid var(--brd);border-radius:var(--r)}.emp-i{font-size:26px;display:block;margin-bottom:5px;opacity:.4}.emp h3{font-family:'Fraunces',serif;font-size:14px;font-weight:700;margin-bottom:2px}.emp p{color:var(--sub);font-size:10px}
/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:999;padding:9px 18px;border-radius:10px;font-size:11px;font-weight:700;box-shadow:0 8px 30px rgba(0,0,0,.25);animation:tIn .3s,tOut .3s 2.7s forwards;pointer-events:none;white-space:nowrap}.toast.tok{background:#065f46;color:#fff}.toast.terr{background:var(--red);color:#fff}.toast.twarn{background:#92400e;color:#fff}@keyframes tIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}@keyframes tOut{to{opacity:0;transform:translateX(-50%) translateY(-10px)}}
/* TABS */
.tabs{display:flex;gap:2px;padding:2px;background:var(--cd2);border-radius:7px;border:1px solid var(--brd);margin-bottom:8px}.tab{flex:1;padding:6px;font-size:10px;font-weight:700;text-align:center;border:none;background:none;border-radius:5px;color:var(--sub);cursor:pointer}.tab.act{background:var(--b600);color:#fff}
/* CHAT */
.ch-box{background:var(--cd2);border:1px solid var(--brd);border-radius:8px;max-height:200px;overflow-y:auto;padding:6px;margin-bottom:5px}.ch-m{margin-bottom:5px;max-width:80%}.ch-m.r{margin-left:auto}.ch-b{padding:6px 9px;border-radius:9px;font-size:10px;line-height:1.4}.ch-m.sys .ch-b{background:var(--g100);color:var(--sub);font-size:9px;text-align:center;max-width:100%;border-radius:4px}.ch-m.inq .ch-b{background:var(--b500);color:#fff;border-bottom-left-radius:2px}.ch-m.prof .ch-b{background:var(--green);color:#fff;border-bottom-right-radius:2px}.ch-m.adm .ch-b{background:var(--purple);color:#fff;border-bottom-right-radius:2px}.ch-meta{font-size:7px;color:var(--g400);margin-top:1px}.ch-inp{display:flex;gap:4px}.ch-inp textarea{flex:1;padding:6px;border:1.5px solid var(--brd);border-radius:6px;font-size:10px;font-family:inherit;color:var(--tx);background:var(--cd);resize:none;min-height:30px}
.qr-w{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:4px}.qr{padding:3px 7px;border-radius:10px;font-size:8px;font-weight:600;border:1.5px solid var(--brd);background:var(--cd);color:var(--tx);cursor:pointer}.qr:hover{border-color:var(--b500);color:var(--b700)}
/* CHECKLIST */
.ck-i{display:flex;align-items:flex-start;gap:6px;padding:5px;border-bottom:1px solid var(--g100)}.ck-i:last-child{border-bottom:none}.ck-c{width:18px;height:18px;border-radius:5px;border:2px solid var(--brd);background:var(--cd);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;font-size:10px}.ck-c.dn{background:var(--green);border-color:var(--green);color:#fff}.ck-t{font-size:10px;flex:1}.ck-t.dn{text-decoration:line-through;color:var(--g400)}.ck-r{font-size:7px;color:var(--red);font-weight:700}
/* MEGA ALERT */
.mega{position:fixed;inset:0;z-index:9000;display:flex;align-items:center;justify-content:center;padding:20px;animation:fi .3s}.mega.emer{background:rgba(239,68,68,.95)}.mega.urge{background:rgba(245,158,11,.95)}.mega.info{background:rgba(59,130,246,.95)}.mega-box{background:#fff;border-radius:18px;padding:26px;max-width:350px;width:100%;text-align:center;box-shadow:0 20px 80px rgba(0,0,0,.5);animation:mB .5s}.mega-ico{font-size:48px;margin-bottom:8px;animation:shk .4s infinite}.mega-tit{font-family:'Fraunces',serif;font-size:18px;font-weight:900;color:#1e293b;margin-bottom:4px}.mega-msg{font-size:12px;color:#475569;line-height:1.5;margin-bottom:14px}.mega-btn{width:100%;padding:11px;border:none;border-radius:10px;font-size:13px;font-weight:800;font-family:inherit;cursor:pointer;color:#fff}.mega-btn.emer{background:#ef4444}.mega-btn.urge{background:#f59e0b}.mega-btn.info{background:#3b82f6}@keyframes mB{0%{transform:scale(.5)}50%{transform:scale(1.05)}100%{transform:scale(1)}}@keyframes shk{0%,100%{transform:rotate(0)}25%{transform:rotate(-10deg)}75%{transform:rotate(10deg)}}
/* REPORT BUTTON */
.report-btn{display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,#dc2626,var(--red));border:none;border-radius:12px;padding:12px 16px;width:100%;color:#fff;cursor:pointer;transition:transform .15s;margin-bottom:12px;text-align:left}.report-btn:active{transform:scale(.98)}.report-btn-ico{font-size:24px;flex-shrink:0}.report-btn-txt{font-family:'Fraunces',serif;font-size:14px;font-weight:800}.report-btn-sub{font-size:9px;opacity:.75;margin-top:1px}
/* JOB CARD */
.job{background:var(--cd);border:2px solid var(--brd);border-radius:12px;overflow:hidden;margin-bottom:10px}.job.emer{border-color:var(--red);animation:jP 2s infinite}.job.urge{border-color:var(--gold)}@keyframes jP{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.3)}50%{box-shadow:0 0 0 8px rgba(239,68,68,0)}}.job-h{padding:10px 12px}.job-b{padding:0 12px 12px}.job-a{display:flex;align-items:flex-start;gap:6px;padding:8px;background:var(--cd2);border-radius:7px;margin-bottom:6px;font-size:11px}.job-bt{width:100%;padding:11px;border:none;border-radius:8px;font-size:12px;font-weight:800;font-family:inherit;cursor:pointer;color:#fff;display:flex;align-items:center;justify-content:center;gap:5px;margin-bottom:4px}.job-bt.go{background:var(--b600)}.job-bt.arr{background:var(--gold)}.job-bt.dn{background:var(--green)}
.call-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:10px;background:var(--greenbg);border:1.5px solid var(--gb);border-radius:8px;font-size:12px;font-weight:700;color:#065f46;text-decoration:none;margin-bottom:6px}
/* PROGRESS */
.prg{padding:2px 0}.prg-s{display:flex;gap:8px;align-items:flex-start;position:relative;padding-bottom:16px}.prg-s:last-child{padding-bottom:0}.prg-s::before{content:'';position:absolute;left:13px;top:28px;bottom:0;width:2px;background:var(--g200)}.prg-s:last-child::before{display:none}.prg-s.done::before{background:var(--green)}.prg-s.active::before{background:linear-gradient(to bottom,var(--green) 50%,var(--g200) 50%)}.prg-d{width:28px;height:28px;border-radius:50%;border:3px solid var(--g200);background:var(--cd);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;z-index:1}.prg-s.done .prg-d{border-color:var(--green);background:var(--greenbg)}.prg-s.active .prg-d{border-color:var(--b500);background:var(--b50);animation:dp 1.5s infinite}@keyframes dp{0%,100%{box-shadow:0 0 0 0 rgba(59,130,246,.3)}50%{box-shadow:0 0 0 5px rgba(59,130,246,0)}}.prg-i{flex:1;padding-top:2px}.prg-tt{font-size:12px;font-weight:700}.prg-s.future .prg-tt{color:var(--g400)}.prg-ds{font-size:10px;color:var(--sub);margin-top:1px;line-height:1.4}.prg-tm{font-size:8px;color:var(--g400);margin-top:1px}
/* EXPAND */
.exp{background:var(--cd);border:1.5px solid var(--brd);border-radius:var(--r);margin-bottom:8px;overflow:hidden}.exp:hover{border-color:var(--b500)}.exp-h{padding:10px 12px;cursor:pointer;display:flex;align-items:center;gap:8px}.exp-a{font-size:11px;color:var(--g400);transition:transform .2s;flex-shrink:0;margin-left:auto}.exp-a.open{transform:rotate(90deg)}.exp-b{display:none;padding:0 12px 12px;border-top:1px solid var(--g100)}.exp-b.show{display:block}
/* PHOTO */
.foto-zone{border:2px dashed var(--brd);border-radius:9px;padding:12px;text-align:center;cursor:pointer;background:var(--cd);transition:all .2s;margin-bottom:6px}.foto-zone:hover{border-color:var(--b500);background:var(--b50)}.foto-zone-ico{font-size:20px;margin-bottom:2px}.foto-zone-txt{font-size:10px;color:var(--sub);font-weight:600}.foto-zone-sub{font-size:8px;color:var(--g400);margin-top:1px}
.foto-prev{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}.foto-pi{position:relative;width:56px;height:56px;border-radius:6px;overflow:hidden;border:1.5px solid var(--brd)}.foto-pi img{width:100%;height:100%;object-fit:cover}.foto-pi .fx{position:absolute;top:1px;right:1px;width:16px;height:16px;border-radius:50%;background:rgba(239,68,68,.9);color:#fff;border:none;font-size:8px;display:flex;align-items:center;justify-content:center;cursor:pointer}

/* LOGIN */
#lov{position:fixed;inset:0;z-index:9999;background:#0a0f1e;display:flex;align-items:center;justify-content:center;padding:16px}#lov::before{content:'';position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(16,185,129,.12),transparent 70%);top:-80px;right:-80px}.lbox{background:rgba(255,255,255,.03);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:36px 28px;width:100%;max-width:340px;text-align:center;position:relative;z-index:1}.lbox .lbr{font-family:'Fraunces',serif;font-size:24px;font-weight:900;color:#fff;margin-bottom:3px}.lbox .lsb{font-size:11px;color:rgba(255,255,255,.4);margin-bottom:22px}.lfrm{display:flex;flex-direction:column;gap:8px}.lfrm input{padding:10px 12px;border:1.5px solid rgba(255,255,255,.1);border-radius:9px;background:rgba(255,255,255,.05);color:#fff;font-size:12px;font-family:inherit;outline:none}.lfrm input:focus{border-color:rgba(16,185,129,.5)}.lfrm button{padding:10px;border:none;border-radius:9px;background:linear-gradient(135deg,#10b981,#059669);color:#fff;font-size:12px;font-weight:700;font-family:inherit}.lfrm button:disabled{opacity:.5}#lerr{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#fca5a5;border-radius:7px;padding:7px;font-size:9px;font-weight:600;margin-top:8px;display:none}

/* HELPERS */
function $(id){return document.getElementById(id)}
function toast(m,t='tok'){const c=$('toasts'),e=document.createElement('div');e.className='toast '+t;e.textContent=m;c.appendChild(e);setTimeout(()=>e.remove(),3200)}
let cfR=null;function cfShow(i,t,m){return new Promise(r=>{$('cfi').textContent=i;$('cft').textContent=t;$('cfm').textContent=m;$('cfdlg').style.display='flex';cfR=r;$('cfok').onclick=()=>{$('cfdlg').style.display='none';r(true)}})}function cfX(){$('cfdlg').style.display='none';if(cfR)cfR(false)}
function fm(n){return n>0?'$'+Math.round(n).toLocaleString('es-CO'):''}
function tk(n){return'#TK-'+String(n).padStart(4,'0')}
function uB(u){return`<span class="urg ${u==='emergencia'?'emer':u==='urgente'?'urge':'prog'}">${u==='emergencia'?'🔴 Emergencia':u==='urgente'?'🟡 Urgente':'🔵 Programable'}</span>`}
function sB(c){if(!c.sla_vence_at)return'';const r=Math.round((new Date(c.sla_vence_at)-Date.now())/36e5*10)/10;return r<0?'<span class="sla danger">⏱ Vencido</span>':r<2?`<span class="sla warn">⏱ ${r}h</span>`:`<span class="sla ok">⏱ ${r}h</span>`}
async function hashP(p){const d=new TextEncoder().encode(p+'HOUSE_CRM_SALT_2026'),b=await crypto.subtle.digest('SHA-256',d);return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('')}
async function hashF(f){const b=await f.arrayBuffer(),h=await crypto.subtle.digest('SHA-256',b);return Array.from(new Uint8Array(h)).map(x=>x.toString(16).padStart(2,'0')).join('')}
function megaAlert(tit,msg,type='info',btn='Entendido'){if(navigator.vibrate)navigator.vibrate([300,100,300,100,300,100,600]);try{const ac=new(window.AudioContext||window.webkitAudioContext)(),o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.frequency.value=type==='emer'?880:660;g.gain.value=0.3;o.start();setTimeout(()=>o.frequency.value=type==='emer'?1100:880,200);setTimeout(()=>o.stop(),700)}catch(e){}const el=document.createElement('div');el.className='mega '+type;el.innerHTML=`<div class="mega-box"><div class="mega-ico">${type==='emer'?'🚨':type==='urge'?'⚠️':'📩'}</div><div class="mega-tit">${tit}</div><div class="mega-msg">${msg}</div><button class="mega-btn ${type}" onclick="this.closest('.mega').remove()">${btn}</button></div>`;$('megas').appendChild(el)}
async function uploadCl(file){const fd=new FormData();fd.append('file',file);fd.append('upload_preset',CP);fd.append('folder','postventa');const res=await fetch('https://api.cloudinary.com/v1_1/'+CN+'/auto/upload',{method:'POST',body:fd});const d=await res.json();if(d.secure_url)return{url:d.secure_url,thumb:d.secure_url.replace('/upload/','/upload/w_400,c_fill,f_auto/')};throw new Error(d.error?.message||'Upload error')}
async function getGPS(){return new Promise(r=>{if(!navigator.geolocation)return r({lat:null,lng:null});navigator.geolocation.getCurrentPosition(p=>r({lat:p.coords.latitude,lng:p.coords.longitude}),()=>r({lat:null,lng:null}),{timeout:5000})})}

/* AUTH */
async function login(){const usr=($('lin_usr').value||'').trim().toLowerCase(),pwd=($('lin_pwd').value||'').trim();if(!usr||!pwd){$('lerr').textContent='Ingresa usuario y contraseña';$('lerr').style.display='block';return}$('lin_btn').disabled=true;$('lin_btn').textContent='...';$('lerr').style.display='none';try{const h=await hashP(pwd);const{data:u}=await SB.from('pv_usuarios').select('*').eq('usuario',usr).eq('activo',true).single();if(!u||u.password_hash!==h){$('lerr').textContent='Datos incorrectos';$('lerr').style.display='block'}else{U={id:u.id,nombre:u.nombre,rol:u.rol,usuario:u.usuario,telefono:u.telefono,email:u.email};sessionStorage.setItem('pv_u',JSON.stringify(U));initApp()}}catch(e){$('lerr').textContent='Error';$('lerr').style.display='block'}$('lin_btn').disabled=false;$('lin_btn').textContent='Ingresar'}

function initApp(){$('lov').style.display='none';$('mhdr').style.display='block';$('uname').textContent=U.nombre;$('muname').textContent=U.nombre;$('murole').textContent=U.rol.toUpperCase();if(localStorage.getItem('pv_th')==='d'){document.body.classList.add('dark');$('tbtn').textContent='🌙'}bMenu();bSec();load();startPoll()}

function startPoll(){if(_poll)clearInterval(_poll);_poll=setInterval(pollAlerts,15000)}
async function pollAlerts(){try{const{data}=await SB.from('pv_alertas').select('*').order('created_at',{ascending:false}).limit(20);if(!data)return;const newAls=data.filter(a=>!a.leida);const cnt=newAls.length;$('bellBdg').textContent=cnt;$('bellBdg').style.display=cnt>0?'flex':'none';if(cnt>_lastAlCount&&_lastAlCount>0){const newest=newAls[0];megaAlert(newest.titulo,newest.mensaje||'Nueva notificación',newest.nivel==='rojo'?'emer':newest.nivel==='amarillo'?'urge':'info','Ver')}_lastAlCount=cnt;ALS=data}catch(e){}}

async function load(){try{const[c1,c2,c3,c4,c5,c6,c7,c8]=await Promise.all([SB.from('pv_casos').select('*,propiedad:pv_propiedades(id,tipo,direccion,ciudad,barrio,codigo_interno,torre,piso),inquilino:pv_inquilinos(id,nombre,apellido,telefono_principal,email),profesional:pv_profesionales(id,nombre,apellido,telefono_principal,especialidades,rating_promedio,usuario_id),categoria:pv_categorias(id,nombre,icono),problema:pv_problemas(id,nombre,urgencia_auto,sla_horas,alerta_seguridad)').order('created_at',{ascending:false}),SB.from('pv_propiedades').select('*,propietario:pv_propietarios(id,nombre,apellido,telefono_principal)').eq('activo',true).order('created_at',{ascending:false}),SB.from('pv_inquilinos').select('*,propiedad:pv_propiedades(id,tipo,direccion,ciudad,codigo_interno)').eq('activo',true).order('created_at',{ascending:false}),SB.from('pv_profesionales').select('*').eq('activo',true).order('nombre'),SB.from('pv_propietarios').select('*').eq('activo',true).order('nombre'),SB.from('pv_categorias').select('*').eq('activa',true).order('orden'),SB.from('pv_problemas').select('*').eq('activo',true).order('categoria_id,orden'),SB.from('pv_alertas').select('*').order('created_at',{ascending:false}).limit(50)]);CASOS=c1.data||[];PROPS=c2.data||[];INQS=c3.data||[];PROFS=c4.data||[];OWNERS=c5.data||[];CATS=c6.data||[];PROBS=c7.data||[];ALS=c8.data||[];_lastAlCount=ALS.filter(a=>!a.leida).length;$('bellBdg').textContent=_lastAlCount;$('bellBdg').style.display=_lastAlCount>0?'flex':'none';

function rDash(){const el=$('sec-dash');if(!el)return;const ab=CASOS.filter(c=>!['cerrado','rechazado','cancelado'].includes(c.estado)),em=ab.filter(c=>c.urgencia==='emergencia').length;let h=`<div style="padding:14px;background:linear-gradient(155deg,#065f46,#059669);border-radius:var(--r);margin-bottom:10px;color:#fff"><div style="font-family:Fraunces,serif;font-size:18px;font-weight:900">Panel Postventa</div><div style="font-size:9px;opacity:.5;margin-top:1px">Tiempo real</div></div>`;h+=`<div class="dg"><div class="dc"><div class="dn2">${ab.length}</div><div class="dl">Abiertos</div></div><div class="dc" style="border-color:var(--red)"><div class="dn2" style="color:var(--red)">${em}</div><div class="dl">Emergencias</div></div><div class="dc"><div class="dn2">${PROPS.length}</div><div class="dl">Propiedades</div></div></div>`;

// Checklist
b+=`<div class="msc"><div class="msct">✅ Checklist (${ck.filter(i=>i.completado).length}/${ck.length})</div>${ck.map(i=>`<div class="ck-i"><div class="ck-c ${i.completado?'dn':''}" onclick="tCk('${i.id}','${id}')">${i.completado?'✓':''}</div><div class="ck-t ${i.completado?'dn':''}">${i.item}</div>${i.obligatorio?'<span class="ck-r">REQ</span>':''}</div>`).join('')}</div>`;
// Chat (dual)
const msSrv=ms.filter(m=>m.canal!=='administrativo'),msAdm=ms.filter(m=>m.canal==='administrativo');
b+=`<div class="msc"><div class="msct">💬 Chat</div><div class="tabs"><button class="tab act" onclick="shChat('srv',this)">Técnico</button><button class="tab" onclick="shChat('adm',this)">Inmobiliaria</button></div><div id="ch-srv">${rChat(msSrv,'servicio',id)}</div><div id="ch-adm" style="display:none">${rChat(msAdm,'administrativo',id)}</div></div>`;

function rClient(){const el=$('sec-mi_inm');if(!el)return;const mI=findMyInq();if(!mI){el.innerHTML='<div class="emp"><span class="emp-i">🏠</span><h3>Inmueble no vinculado</h3><p>Contacta a la inmobiliaria</p></div>';return}
const p=mI.propiedad,mc=CASOS.filter(c=>c.inquilino_id===mI.id&&!['cerrado','rechazado','cancelado'].includes(c.estado)),cerr=CASOS.filter(c=>c.inquilino_id===mI.id&&c.estado==='cerrado');
let h=`<div style="padding:12px;background:linear-gradient(135deg,var(--b700),var(--b600));border-radius:var(--r);margin-bottom:10px;color:#fff"><div style="font-family:Fraunces,serif;font-size:16px;font-weight:800">Hola, ${mI.nombre} 👋</div><div style="font-size:10px;opacity:.7">📍 ${p?p.direccion+', '+p.ciudad:''}</div></div>`;
h+=`<button class="report-btn" onclick="cReport('${mI.id}','${mI.propiedad_id}')"><span class="report-btn-ico">🚨</span><div><div class="report-btn-txt">Reportar problema</div><div class="report-btn-sub">Reporta un daño o emergencia</div></div></button>`;
if(mc.length){h+=`<div style="font-family:Fraunces,serif;font-size:14px;font-weight:700;margin-bottom:6px">Casos activos (${mc.length})</div>`;mc.forEach((c,i)=>h+=buildExp(c,i===0))}
if(cerr.length){h+=`<div style="font-family:Fraunces,serif;font-size:14px;font-weight:700;margin:10px 0 6px">Resueltos</div>`;cerr.forEach(c=>{const eg=c.garantia_hasta&&new Date(c.garantia_hasta)>new Date();h+=`<div class="cli"><div class="cli-ico">✅</div><div class="cli-info"><div class="cli-t">${tk(c.numero_caso)} · ${c.problema?.nombre||''}</div></div>${eg?'<span style="padding:2px 5px;border-radius:5px;font-size:7px;font-weight:700;background:var(--greenbg);color:#065f46">🛡️</span>':''}</div>`})}
el.innerHTML=h;
// Load chats for active cases
mc.forEach(async c=>{const{data:ms}=await SB.from('pv_mensajes').select('*').eq('caso_id',c.id).order('created_at');const msSrv=(ms||[]).filter(m=>m.canal!=='administrativo'),msAdm=(ms||[]).filter(m=>m.canal==='administrativo');const chatEl=$('cc_'+c.id);if(chatEl)chatEl.innerHTML=`<div class="tabs"><button class="tab act" onclick="$('ccs_${c.id}').style.display='block';$('cca_${c.id}').style.display='none';this.classList.add('act');this.nextElementSibling.classList.remove('act')">Chat técnico</button><button class="tab" onclick="$('cca_${c.id}').style.display='block';$('ccs_${c.id}').style.display='none';this.classList.add('act');this.previousElementSibling.classList.remove('act')">Chat inmobiliaria</button></div><div id="ccs_${c.id}">${rChat(msSrv,'servicio',c.id)}</div><div id="cca_${c.id}" style="display:none">${rChat(msAdm,'administrativo',c.id)}</div>`})}

function buildExp(c,open){const ex=EX[c.estado]||{};const steps=['reportado','validado','asignado','en_camino','en_ejecucion','completado','cerrado'],ci=steps.indexOf(c.estado);
let tl='<div class="prg">';steps.forEach((s,i)=>{const e=EX[s]||{};const cls=i<ci?'done':i===ci?'active':'future';let ts='';if(i<=ci){const t=c[s+'_at']||c.created_at;if(t)ts=new Date(t).toLocaleString('es-CO',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}
let reas='';if(s==='asignado'&&c.reasignaciones>0)reas=`<div style="margin:3px 0;padding:4px 6px;background:var(--goldbg);border:1px solid var(--yb);border-radius:5px;font-size:9px;color:#92400e">⚠️ Reasignado${c.motivo_reasignacion?' — '+c.motivo_reasignacion:''}</div>`;
tl+=`<div class="prg-s ${cls}"><div class="prg-d">${e.i||'○'}</div><div class="prg-i"><div class="prg-tt">${e.t||s}</div>${i<=ci?`<div class="prg-ds">${e.d||''}</div>`:''}<div class="prg-tm">${ts}</div>${reas}</div></div>`});tl+='</div>';
let prof='';if(c.profesional)prof=`<div style="margin-top:6px;padding:6px;background:var(--greenbg);border:1px solid var(--gb);border-radius:6px;font-size:10px">🔧 <b>${c.profesional.nombre}</b> · ⭐ ${c.profesional.rating_promedio}</div>`;
let rate='';if(c.estado==='completado'&&!c.calificacion_inquilino)rate=`<div style="text-align:center;padding:10px;background:var(--goldbg);border:1px solid var(--yb);border-radius:7px;margin-top:6px"><div style="font-size:11px;font-weight:800;margin-bottom:4px">⭐ Califica</div><div style="display:flex;justify-content:center;gap:8px">${[1,2,3,4,5].map(n=>`<button style="font-size:24px;background:none;border:none;cursor:pointer" onclick="cRate('${c.id}',${n})">⭐</button>`).join('')}</div></div>`;
if(c.calificacion_inquilino)rate=`<div style="text-align:center;font-size:11px;color:var(--green);font-weight:700;margin-top:4px">${'⭐'.repeat(c.calificacion_inquilino)}</div>`;
return`<div class="exp" id="ec_${c.id}"><div class="exp-h" onclick="togExp('${c.id}')"><span style="font-size:18px">${ex.i||'📩'}</span><div style="flex:1"><div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap"><span class="ticket-num">${tk(c.numero_caso)}</span>${uB(c.urgencia)}</div><div style="font-size:12px;font-weight:700;margin-top:2px">${ex.t||c.estado}</div><div style="font-size:9px;color:var(--sub)">${c.categoria?.icono||''} ${c.problema?.nombre||''}</div></div><span class="exp-a ${open?'open':''}">›</span></div><div class="exp-b ${open?'show':''}">${tl}${prof}${rate}<div style="margin-top:8px" id="cc_${c.id}"><div style="font-size:8px;color:var(--g400)">Cargando chat...</div></div></div></div>`}

function togExp(id){const b=document.querySelector('#ec_'+id+' .exp-b'),a=document.querySelector('#ec_'+id+' .exp-a');if(b)b.classList.toggle('show');if(a)a.classList.toggle('open')}
function rClientRep(){const el=$('sec-mis_rep');if(!el)return;const mI=findMyInq();if(!mI){el.innerHTML='<div class="emp"><span class="emp-i">📋</span><h3>Sin reportes</h3></div>';return}const todos=CASOS.filter(c=>c.inquilino_id===mI.id);let h=`<div style="font-family:Fraunces,serif;font-size:14px;font-weight:700;margin-bottom:8px">Mis reportes (${todos.length})</div>`;if(!todos.length){el.innerHTML=h+'<div class="emp"><span class="emp-i">📋</span><h3>Sin reportes</h3></div>';return}todos.forEach((c,i)=>h+=buildExp(c,i===0));el.innerHTML=h;
todos.forEach(async c=>{const{data:ms}=await SB.from('pv_mensajes').select('*').eq('caso_id',c.id).order('created_at');const msSrv=(ms||[]).filter(m=>m.canal!=='administrativo'),msAdm=(ms||[]).filter(m=>m.canal==='administrativo');const chatEl=$('cc_'+c.id);if(chatEl)chatEl.innerHTML=`<div class="tabs"><button class="tab act" onclick="$('ccs_${c.id}').style.display='block';$('cca_${c.id}').style.display='none';this.classList.add('act');this.nextElementSibling.classList.remove('act')">Técnico</button><button class="tab" onclick="$('cca_${c.id}').style.display='block';$('ccs_${c.id}').style.display='none';this.classList.add('act');this.previousElementSibling.classList.remove('act')">Inmobiliaria</button></div><div id="ccs_${c.id}">${rChat(msSrv,'servicio',c.id)}</div><div id="cca_${c.id}" style="display:none">${rChat(msAdm,'administrativo',c.id)}</div>`})}
async function cRate(id,n){await SB.from('pv_casos').update({calificacion_inquilino:n}).eq('id',id);toast('⭐ Gracias');await load()}

/* CLIENT REPORT */
function cReport(iId,pId){$('mtt').textContent='Reportar problema';$('msb3').textContent='Cuéntanos qué pasó';_pf=[];
let b=`<div class="ff"><label class="ffl">¿Qué se dañó? <span class="ffr">*</span></label><select class="ffi" id="cr_c" onchange="crCatCh()"><option value="">Seleccionar...</option>${CATS.map(c=>`<option value="${c.id}">${c.icono} ${c.nombre}</option>`).join('')}</select></div>`;
b+=`<div class="ff"><label class="ffl">Problema específico</label><select class="ffi" id="cr_p" onchange="crProbCh()"><option value="">Primero selecciona qué se dañó</option></select></div>`;
b+=`<div id="cr_alert"></div>`;
b+=`<div id="cr_guide"></div>`;
b+=`<div class="ff"><label class="ffl">Describe el problema <span class="ffr">*</span></label><textarea class="ffi" id="cr_d" style="min-height:60px" placeholder="Explica qué pasó, desde cuándo..."></textarea></div>`;
b+=`<div class="ff"><label class="ffl">¿Dónde exactamente?</label><input class="ffi" id="cr_u" placeholder="Ej: baño principal, cocina..."></div>`;
b+=`<div class="ff"><label class="ffl">📷 Fotos y videos del daño</label><div class="foto-zone" onclick="$('cr_finp').click()"><div class="foto-zone-ico">📷</div><div class="foto-zone-txt">Toca para agregar fotos</div><div class="foto-zone-sub">JPG, PNG, MP4 · Máx 10MB</div></div><input type="file" id="cr_finp" multiple accept="image/*,video/*" style="display:none" onchange="crUpload(this.files)"><div class="foto-prog" id="cr_fprog"><span style="width:0%"></span></div><div class="foto-prev" id="cr_fprev"></div></div>`;
b+=`<button class="bt bp" style="width:100%;padding:11px;font-size:13px;margin-top:4px" onclick="crSave('${iId}','${pId}')">📩 Enviar reporte</button>`;
$('mbd').innerHTML=b;$('mdl').style.display='flex';document.body.style.overflow='hidden'}

function crCatCh(){const catId=$('cr_c').value;$('cr_p').innerHTML='<option value="">Seleccionar...</option>'+PROBS.filter(p=>p.categoria_id===catId).map(p=>`<option value="${p.id}">${p.nombre}</option>`).join('');
const g=FG[catId]||FG.otro;$('cr_guide').innerHTML=`<div class="fguide"><div class="fguide-t">📷 Guía: qué fotografiar</div>${g.items.map((item,i)=>`<div class="fguide-i"><span class="fguide-n">${i+1}</span><span>${item}</span></div>`).join('')}<div class="fguide-tip">💡 ${g.tip}</div></div>`}
function crProbCh(){const prob=PROBS.find(p=>p.id===$('cr_p').value);if(prob?.alerta_seguridad)$('cr_alert').innerHTML=`<div style="padding:8px;background:var(--redbg);border:2px solid var(--rb);border-radius:7px;margin-bottom:8px;font-size:10px;color:var(--red);font-weight:700">🚨 ${prob.alerta_seguridad}</div>`;else $('cr_alert').innerHTML=''}

async function crUpload(files){const prog=$('cr_fprog'),prev=$('cr_fprev');prog.style.display='block';const gps=await getGPS();
for(let i=0;i<files.length;i++){prog.querySelector('span').style.width=Math.round((i+1)/files.length*100)+'%';try{const hash=await hashF(files[i]);const res=await uploadCl(files[i]);_pf.push({...res,hash,gps_lat:gps.lat,gps_lng:gps.lng});const it=document.createElement('div');it.className='foto-pi';const idx=_pf.length-1;it.innerHTML=`<img src="${res.thumb}"><button class="fx" onclick="this.parentElement.remove();_pf.splice(${idx},1)">✕</button>`;prev.appendChild(it)}catch(e){toast('Error: '+files[i].name,'terr')}}
setTimeout(()=>{prog.style.display='none';prog.querySelector('span').style.width='0%'},800);if(_pf.length)toast('📷 '+_pf.length+' archivo(s) subidos')}

async function crSave(iId,pId){const cId=$('cr_c').value,prId=$('cr_p').value,d=$('cr_d').value.trim();
if(!cId){toast('Selecciona qué se dañó','twarn');return}if(!d){toast('Describe el problema','twarn');return}
const prob=PROBS.find(p=>p.id===prId);
const{data:nc,error}=await SB.from('pv_casos').insert({propiedad_id:pId,inquilino_id:iId,categoria_id:cId,problema_id:prId||null,descripcion:d,urgencia:prob?prob.urgencia_auto:'programable',ubicacion_especifica:$('cr_u').value||null,reportado_por:U.id}).select().single();
if(error){toast('Error al guardar: '+error.message,'terr');console.error(error);return}
// Save photos
for(const f of _pf){await SB.from('pv_evidencias').insert({caso_id:nc.id,tipo:'reporte',url:f.url,url_thumb:f.thumb,hash_sha256:f.hash,gps_lat:f.gps_lat,gps_lng:f.gps_lng,subido_por:'inquilino'})}_pf=[];
// Alert to admin/postventa
await SB.from('pv_alertas').insert({tipo:'caso_nuevo',nivel:prob?.urgencia_auto==='emergencia'?'rojo':'amarillo',titulo:'🚨 '+(prob?.nombre||'Nuevo reporte')+' — '+U.nombre,mensaje:'Caso '+tk(nc.numero_caso)+' creado. Urgencia: '+(prob?.urgencia_auto||'programable'),caso_id:nc.id,de_usuario_id:U.id,para_rol:'postventa'});
toast('📩 Reporte enviado');cm();await load();
megaAlert('¡Solicitud recibida!','Tu ticket es '+tk(nc.numero_caso)+'. Ya nos ponemos a trabajar para solucionarlo lo antes posible.','info','Entendido')}

function cView(id){go('mis_rep')}/* redirect to mis reportes which shows expanded */

function cm(){$('mdl').style.display='none';document.body.style.overflow=''}
document.addEventListener('keydown',e=>{if(e.key==='Escape')cm()});
window.addEventListener('DOMContentLoaded',()=>{const c=sessionStorage.getItem('pv_u');if(c){try{U=JSON.parse(c);initApp()}catch(e){sessionStorage.removeItem('pv_u')}}});
</script>
</body>
</html>
