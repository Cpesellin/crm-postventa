<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>House Postventa</title>
<meta name="theme-color" content="#0a0f1e">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Fraunces:ital,wght@0,600;0,700;0,900;1,600;1,700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--g50:#f8fafc;--g100:#f1f5f9;--g200:#e2e8f0;--g300:#cbd5e1;--g400:#94a3b8;--g500:#64748b;--g600:#475569;--g700:#334155;--g800:#1e293b;--g900:#0f172a;--b50:#eff6ff;--b100:#dbeafe;--b200:#bfdbfe;--b500:#3b82f6;--b600:#2563eb;--b700:#1d4ed8;--green:#10b981;--greenbg:#ecfdf5;--gb:rgba(16,185,129,.2);--red:#ef4444;--redbg:#fef2f2;--rb:rgba(239,68,68,.2);--gold:#f59e0b;--goldbg:#fffbeb;--yb:rgba(245,158,11,.2);--purple:#8b5cf6;--r:12px;--bg:#f8fafc;--cd:#fff;--cd2:#f1f5f9;--brd:var(--g200);--tx:var(--g800);--sub:var(--g500);--hdr:rgba(255,255,255,.97)}
body.dark{--g50:#1e293b;--g100:#1e2a3a;--g200:#334155;--g300:#475569;--g400:#64748b;--g500:#94a3b8;--g600:#cbd5e1;--g700:#e2e8f0;--g800:#f1f5f9;--g900:#f8fafc;--b50:#172554;--b100:#1e3a5f;--b200:#1e40af;--greenbg:#064e3b;--gb:rgba(16,185,129,.35);--redbg:#450a0a;--rb:rgba(239,68,68,.35);--goldbg:#451a03;--yb:rgba(245,158,11,.35);--bg:#0f172a;--cd:#1e293b;--cd2:#1a2332;--brd:#334155;--tx:#f1f5f9;--sub:#94a3b8;--hdr:rgba(15,23,42,.97)}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}button{font-family:inherit;cursor:pointer}input,select,textarea{font-family:inherit}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--g300);border-radius:3px}
/* HEADER */
header{position:sticky;top:0;z-index:100;background:var(--hdr);backdrop-filter:blur(16px);border-bottom:1px solid var(--brd)}.hnav{max-width:1300px;margin:0 auto;padding:0 14px;height:54px;display:flex;align-items:center;justify-content:space-between}.lm{font-family:'Fraunces',serif;font-size:14px;font-weight:800;color:var(--g900)}.nr{display:flex;align-items:center;gap:6px}
.ib{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--brd);background:var(--cd2);font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--tx);position:relative}.ib:hover{border-color:var(--b500)}.bdg{position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;font-size:8px;font-weight:800;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px}
.up{cursor:pointer}.up span{font-size:10px;font-weight:700;color:var(--b700);padding:3px 10px;background:var(--b50);border:1px solid var(--b200);border-radius:14px}
/* BELL */
.bw{position:relative}.bdd{position:absolute;top:calc(100% + 6px);right:0;width:300px;background:var(--cd);border:1.5px solid var(--brd);border-radius:12px;box-shadow:0 12px 40px rgba(0,0,0,.2);z-index:150;display:none;overflow:hidden}.bdd.sh{display:block}.bhd{padding:10px 14px;border-bottom:1px solid var(--brd);font-size:12px;font-weight:800}.bls{max-height:280px;overflow-y:auto}.bit{padding:10px 14px;border-bottom:1px solid var(--g100);cursor:pointer}.bit:hover{background:var(--cd2)}.bit:last-child{border:none}.bit b{font-size:10px}.bit small{display:block;color:var(--sub);font-size:9px;margin-top:1px}
@media(max-width:640px){.bdd{position:fixed;top:58px;left:8px;right:8px;width:auto}}
/* SIDEBAR */
.ov{position:fixed;inset:0;z-index:200;background:rgba(15,23,42,.5);display:none}.ov.op{display:block}.sp{position:fixed;top:0;left:0;bottom:0;width:260px;background:var(--cd);border-right:1px solid var(--brd);z-index:201;transform:translateX(-100%);transition:transform .25s;overflow-y:auto;display:flex;flex-direction:column}.sp.op{transform:translateX(0)}.shd{padding:14px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between}.sbr{font-family:'Fraunces',serif;font-size:14px;font-weight:800;color:var(--g900);display:flex;align-items:center;gap:6px}.scl{width:28px;height:28px;border-radius:7px;border:1px solid var(--brd);background:var(--cd2);font-size:12px;display:flex;align-items:center;justify-content:center;color:var(--sub)}
.mi{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:8px;font-size:13px;font-weight:600;color:var(--tx);border:none;background:none;width:calc(100% - 16px);text-align:left;margin:2px 8px}.mi:hover{background:var(--b50);color:var(--b700)}.mi.act{background:var(--b600);color:#fff}.mi .mic{font-size:15px;width:20px;text-align:center}
.sdv{height:1px;background:var(--brd);margin:6px 12px}.smu{padding:12px;border-top:1px solid var(--brd);display:flex;align-items:center;gap:8px;margin-top:auto}.smn{font-size:11px;font-weight:700}.smr{font-size:8px;color:var(--sub);text-transform:uppercase;letter-spacing:1px}.slo{font-size:10px;color:var(--red);font-weight:700;border:none;background:none;padding:4px 8px;border-radius:5px;margin-left:auto}
/* SECTIONS */
.sec{display:none;max-width:1300px;margin:0 auto;padding:12px 14px 80px}.sec.act{display:block}
/* COMPONENTS */
.card{background:var(--cd);border:1px solid var(--brd);border-radius:var(--r);overflow:hidden;margin-bottom:10px}.cdh{padding:10px 14px;border-bottom:1px solid var(--g100);display:flex;align-items:center;justify-content:space-between;gap:6px}.chl{display:flex;align-items:center;gap:8px}.chi{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;background:var(--b50)}.cht{font-family:'Fraunces',serif;font-size:13px;font-weight:700}.cdb{padding:10px 14px}
.ffi{width:100%;padding:9px 11px;border:2px solid var(--brd);border-radius:8px;font-size:12px;color:var(--tx);background:var(--cd)}.ffi:focus{outline:none;border-color:var(--b500)}.ffl{display:block;font-size:8px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--sub);margin-bottom:4px}.ffr{color:var(--gold)}.ff{margin-bottom:10px}
.bt{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:9px 14px;border:none;border-radius:8px;font-size:12px;font-weight:700;white-space:nowrap}.bp{background:var(--b600);color:#fff}.bp:hover{background:var(--b700)}.bgr{background:var(--green);color:#fff}.bd{background:var(--redbg);color:var(--red);border:1.5px solid var(--rb)}.bpur{background:var(--purple);color:#fff}.bsm{padding:6px 10px;font-size:10px;border-radius:6px}
/* KANBAN */
.pw{overflow-x:auto;padding:10px 0}.pipe{display:flex;gap:8px;min-width:max-content}.pcol{width:210px;min-width:210px;background:var(--cd2);border:1px solid var(--brd);border-radius:var(--r);flex-shrink:0;max-height:calc(100vh - 240px);display:flex;flex-direction:column}.pch{padding:8px 10px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between}.pct{font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:1px}.pcc{font-size:9px;font-weight:800;background:var(--cd);padding:2px 7px;border-radius:8px;color:var(--sub)}.pcb{padding:5px;overflow-y:auto;flex:1;min-height:40px}.pkc{background:var(--cd);border:1.5px solid var(--brd);border-radius:8px;padding:8px;margin-bottom:5px;cursor:pointer;font-size:10px}.pkc:hover{border-color:var(--b500)}
.pcol[data-c="reportado"] .pch{background:rgba(59,130,246,.06)}.pcol[data-c="reportado"] .pct{color:var(--b600)}
.pcol[data-c="validado"] .pch{background:rgba(139,92,246,.06)}.pcol[data-c="validado"] .pct{color:var(--purple)}
.pcol[data-c="asignado"] .pch{background:rgba(245,158,11,.06)}.pcol[data-c="asignado"] .pct{color:var(--gold)}
.pcol[data-c="en_camino"] .pch{background:rgba(245,158,11,.12)}.pcol[data-c="en_camino"] .pct{color:#d97706}
.pcol[data-c="en_ejecucion"] .pch{background:rgba(6,182,212,.08)}.pcol[data-c="en_ejecucion"] .pct{color:#0891b2}
.pcol[data-c="completado"] .pch{background:rgba(16,185,129,.08)}.pcol[data-c="completado"] .pct{color:var(--green)}
/* BADGES */
.urg{display:inline-flex;padding:2px 6px;border-radius:8px;font-size:8px;font-weight:800}.urg.emer{background:var(--redbg);color:var(--red);border:1px solid var(--rb);animation:pu 1.5s infinite}.urg.urge{background:var(--goldbg);color:#92400e;border:1px solid var(--yb)}.urg.prog{background:var(--b50);color:var(--b700);border:1px solid var(--b200)}@keyframes pu{0%,100%{opacity:1}50%{opacity:.5}}
.sla{font-size:8px;font-weight:700;padding:2px 6px;border-radius:8px;display:inline-flex;gap:2px}.sla.ok{background:var(--greenbg);color:#065f46}.sla.warn{background:var(--goldbg);color:#92400e}.sla.danger{background:var(--redbg);color:var(--red)}
.tkn{font-family:'Fraunces',serif;font-size:10px;font-weight:800;color:var(--b600);background:var(--b50);border:1px solid var(--b200);padding:2px 7px;border-radius:5px}
/* STATS */
.dg{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:6px;margin-bottom:12px}.dc{background:var(--cd);border:1px solid var(--brd);border-radius:9px;padding:12px;text-align:center}.dn2{font-family:'Fraunces',serif;font-size:22px;font-weight:700;color:var(--b700)}.dl{font-size:8px;color:var(--sub);margin-top:2px;text-transform:uppercase;letter-spacing:1px}
/* LIST */
.cli{background:var(--cd);border:1px solid var(--brd);border-radius:9px;padding:10px;margin-bottom:5px;display:flex;gap:8px;align-items:center;cursor:pointer;transition:border-color .15s}.cli:hover{border-color:var(--b500)}.cli-i{font-size:18px;flex-shrink:0;width:26px;text-align:center}.cli-c{flex:1;min-width:0}.cli-t{font-size:11px;font-weight:700}.cli-s{font-size:9px;color:var(--sub);margin-top:1px}.cli-r{text-align:right;flex-shrink:0}
/* MODAL */
.mo{position:fixed;inset:0;z-index:300;background:rgba(15,23,42,.6);backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center;animation:fi .2s}@media(min-width:641px){.mo{align-items:center;padding:16px}}@keyframes fi{from{opacity:0}to{opacity:1}}.mbox{background:var(--cd);border-radius:16px 16px 0 0;width:100%;max-width:540px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 -8px 40px rgba(0,0,0,.3);animation:su .25s}@media(min-width:641px){.mbox{border-radius:14px;max-height:85vh}}@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}.mhandle{width:40px;height:5px;background:var(--g300);border-radius:3px;margin:10px auto 4px}@media(min-width:641px){.mhandle{display:none}}.mhdr{padding:10px 14px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;gap:6px;flex-shrink:0}.mtt{font-family:'Fraunces',serif;font-size:15px;font-weight:700}.mst{font-size:10px;color:var(--sub);margin-top:1px}.mx{min-width:34px;height:34px;border-radius:8px;border:2px solid var(--brd);background:var(--cd2);font-size:15px;display:flex;align-items:center;justify-content:center;color:var(--sub)}.mx:hover{background:var(--redbg);color:var(--red)}.mbd{padding:12px 14px 20px;overflow-y:auto;flex:1}
.msc{margin-bottom:10px}.msct{font-size:8px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--g400);margin-bottom:5px;padding-bottom:3px;border-bottom:1px solid var(--g100)}.mgr{display:grid;grid-template-columns:1fr 1fr;gap:5px}.mf{background:var(--cd2);border:1px solid var(--brd);border-radius:7px;padding:7px 9px}.mfl{font-size:7px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--g400);margin-bottom:1px}.mfv{font-size:11px;font-weight:600}.mf.ful{grid-column:1/-1}
/* EMPTY */
.emp{text-align:center;padding:28px 14px;background:var(--cd);border:1px solid var(--brd);border-radius:var(--r)}.emp h3{font-family:'Fraunces',serif;font-size:14px;font-weight:700;margin-bottom:2px}.emp p{color:var(--sub);font-size:10px}
/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:999;padding:9px 18px;border-radius:10px;font-size:11px;font-weight:700;box-shadow:0 8px 30px rgba(0,0,0,.25);animation:tIn .3s,tOut .3s 2.7s forwards;pointer-events:none}.toast.tok{background:#065f46;color:#fff}.toast.terr{background:var(--red);color:#fff}.toast.twarn{background:#92400e;color:#fff}@keyframes tIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}@keyframes tOut{to{opacity:0;transform:translateX(-50%) translateY(-10px)}}
/* TABS */
.tabs{display:flex;gap:2px;padding:2px;background:var(--cd2);border-radius:7px;border:1px solid var(--brd);margin-bottom:8px}.tab{flex:1;padding:6px;font-size:10px;font-weight:700;text-align:center;border:none;background:none;border-radius:5px;color:var(--sub);cursor:pointer}.tab.act{background:var(--b600);color:#fff}
/* CHAT */
.chatbox{background:var(--cd2);border:1px solid var(--brd);border-radius:8px;max-height:180px;overflow-y:auto;padding:6px;margin-bottom:5px}
.cmsg{margin-bottom:5px;max-width:80%}.cmsg.r{margin-left:auto}.cbub{padding:6px 9px;border-radius:9px;font-size:10px;line-height:1.4}
.cmsg.sys .cbub{background:var(--g100);color:var(--sub);font-size:9px;text-align:center;max-width:100%;border-radius:4px}
.cmsg.inq .cbub{background:var(--b500);color:#fff;border-bottom-left-radius:2px}
.cmsg.prof .cbub{background:var(--green);color:#fff;border-bottom-right-radius:2px}
.cmsg.adm .cbub{background:var(--purple);color:#fff;border-bottom-right-radius:2px}
.cmeta{font-size:7px;color:var(--g400);margin-top:1px}
.cinp{display:flex;gap:4px}.cinp textarea{flex:1;padding:6px;border:1.5px solid var(--brd);border-radius:6px;font-size:10px;color:var(--tx);background:var(--cd);resize:none;min-height:30px}
.qrw{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:4px}.qr{padding:3px 7px;border-radius:10px;font-size:8px;font-weight:600;border:1.5px solid var(--brd);background:var(--cd);color:var(--tx);cursor:pointer}.qr:hover{border-color:var(--b500)}
/* CHECKLIST */
.cki{display:flex;gap:6px;padding:5px;border-bottom:1px solid var(--g100)}.cki:last-child{border-bottom:none}.ckb{width:18px;height:18px;border-radius:5px;border:2px solid var(--brd);background:var(--cd);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;font-size:10px}.ckb.dn{background:var(--green);border-color:var(--green);color:#fff}.cktx{font-size:10px;flex:1}.cktx.dn{text-decoration:line-through;color:var(--g400)}
/* MEGA ALERT */
.mega{position:fixed;inset:0;z-index:9000;display:flex;align-items:center;justify-content:center;padding:20px;animation:fi .3s}
.mega.emer{background:rgba(239,68,68,.95)}.mega.urge{background:rgba(245,158,11,.95)}.mega.info{background:rgba(59,130,246,.95)}
.megab{background:#fff;border-radius:18px;padding:26px;max-width:350px;width:100%;text-align:center;box-shadow:0 20px 80px rgba(0,0,0,.5);animation:mBnc .5s}
.megai{font-size:52px;margin-bottom:8px;animation:shk .5s infinite}
.megat{font-family:'Fraunces',serif;font-size:20px;font-weight:900;color:#1e293b;margin-bottom:4px}
.megam{font-size:13px;color:#475569;line-height:1.5;margin-bottom:14px}
.megabt{width:100%;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;color:#fff}
.megabt.emer{background:#ef4444}.megabt.urge{background:#f59e0b}.megabt.info{background:#3b82f6}
@keyframes mBnc{0%{transform:scale(.3)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
@keyframes shk{0%,100%{transform:rotate(0)}20%{transform:rotate(-15deg)}40%{transform:rotate(15deg)}60%{transform:rotate(-15deg)}80%{transform:rotate(15deg)}}
/* REPORT BTN */
.rbtn{display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,#dc2626,var(--red));border:none;border-radius:12px;padding:12px 16px;width:100%;color:#fff;cursor:pointer;margin-bottom:12px;text-align:left}.rbtn:active{transform:scale(.98)}
/* JOB */
.job{background:var(--cd);border:2px solid var(--brd);border-radius:12px;overflow:hidden;margin-bottom:10px}.job.emer{border-color:var(--red)}.job.urge{border-color:var(--gold)}.jobh{padding:10px 12px}.jobb{padding:0 12px 12px}
.jobbt{width:100%;padding:11px;border:none;border-radius:8px;font-size:12px;font-weight:800;cursor:pointer;color:#fff;display:flex;align-items:center;justify-content:center;gap:5px;margin-bottom:4px}
.jobbt.go{background:var(--b600)}.jobbt.arr{background:var(--gold)}.jobbt.dn{background:var(--green)}.jobbt.take{background:var(--purple)}
.callb{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:10px;background:var(--greenbg);border:1.5px solid var(--gb);border-radius:8px;font-size:12px;font-weight:700;color:#065f46;text-decoration:none;margin-bottom:6px}
/* PROGRESS */
.prg{padding:2px 0}.prs{display:flex;gap:8px;position:relative;padding-bottom:16px}.prs:last-child{padding-bottom:0}
.prs::before{content:'';position:absolute;left:13px;top:28px;bottom:0;width:2px;background:var(--g200)}.prs:last-child::before{display:none}
.prs.done::before{background:var(--green)}.prs.active::before{background:linear-gradient(to bottom,var(--green) 50%,var(--g200) 50%)}
.prd{width:28px;height:28px;border-radius:50%;border:3px solid var(--g200);background:var(--cd);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;z-index:1}
.prs.done .prd{border-color:var(--green);background:var(--greenbg)}.prs.active .prd{border-color:var(--b500);background:var(--b50);animation:dp 1.5s infinite}
@keyframes dp{0%,100%{box-shadow:0 0 0 0 rgba(59,130,246,.3)}50%{box-shadow:0 0 0 5px rgba(59,130,246,0)}}
.pri{flex:1;padding-top:2px}.prt{font-size:12px;font-weight:700}.prs.future .prt{color:var(--g400)}.prds{font-size:10px;color:var(--sub);margin-top:1px;line-height:1.4}.prtm{font-size:8px;color:var(--g400);margin-top:1px}
/* EXPAND CARD */
.exp{background:var(--cd);border:1.5px solid var(--brd);border-radius:var(--r);margin-bottom:8px;overflow:hidden}.exp:hover{border-color:var(--b500)}
.exph{padding:10px 12px;cursor:pointer;display:flex;align-items:center;gap:8px}
.expa{font-size:11px;color:var(--g400);transition:transform .2s;margin-left:auto}.expa.open{transform:rotate(90deg)}
.expb{display:none;padding:0 12px 12px;border-top:1px solid var(--g100)}.expb.show{display:block}
/* PHOTO */
.fzone{border:2px dashed var(--brd);border-radius:9px;padding:12px;text-align:center;cursor:pointer;background:var(--cd);margin-bottom:6px}.fzone:hover{border-color:var(--b500);background:var(--b50)}
.fprev{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}.fpi{position:relative;width:56px;height:56px;border-radius:6px;overflow:hidden;border:1.5px solid var(--brd)}.fpi img{width:100%;height:100%;object-fit:cover}
.fprog{height:3px;background:var(--g200);border-radius:2px;margin-top:4px;overflow:hidden;display:none}.fprog span{display:block;height:100%;background:var(--b500);transition:width .3s}
.fguide{background:var(--b50);border:1.5px solid var(--b200);border-radius:9px;padding:10px;margin-bottom:8px}.fguide b{font-size:10px;color:var(--b700)}.fguide p{font-size:9px;color:var(--sub);margin-top:2px;line-height:1.3}.fguide .tip{margin-top:4px;padding:5px 7px;background:var(--goldbg);border:1px solid var(--yb);border-radius:5px;font-size:8px;color:#92400e}
/* PENDING APPROVAL BADGE */
.pend-badge{background:var(--goldbg);border:1.5px solid var(--yb);color:#92400e;font-size:9px;font-weight:800;padding:3px 8px;border-radius:6px;display:inline-flex;align-items:center;gap:3px}
/* CONFIRM */
.cfdlg{position:fixed;inset:0;z-index:400;background:rgba(15,23,42,.7);display:flex;align-items:center;justify-content:center;padding:16px;animation:fi .15s}.cfbox{background:var(--cd);border-radius:12px;padding:22px;max-width:320px;width:100%;text-align:center}.cfbox .cfi{font-size:34px;margin-bottom:8px}.cfbox .cft{font-size:14px;font-weight:800;margin-bottom:3px}.cfbox .cfm{font-size:10px;color:var(--sub);margin-bottom:12px}.cfbtns{display:flex;gap:6px}.cfbtns button{flex:1;padding:8px;border-radius:7px;font-size:11px;font-weight:700;border:none}
/* LOGIN */
#lov{position:fixed;inset:0;z-index:9999;background:#0a0f1e;display:flex;align-items:center;justify-content:center;padding:16px}
.lbox{background:rgba(255,255,255,.03);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:36px 28px;width:100%;max-width:340px;text-align:center;position:relative;z-index:1}
.lbox .lbr{font-family:'Fraunces',serif;font-size:22px;font-weight:900;color:#fff;margin-bottom:3px}
.lbox .lsb{font-size:11px;color:rgba(255,255,255,.4);margin-bottom:22px}
.lfrm{display:flex;flex-direction:column;gap:8px}
.lfrm input{padding:10px 12px;border:1.5px solid rgba(255,255,255,.1);border-radius:9px;background:rgba(255,255,255,.05);color:#fff;font-size:12px;outline:none}
.lfrm input:focus{border-color:rgba(16,185,129,.5)}
.lfrm button{padding:10px;border:none;border-radius:9px;background:linear-gradient(135deg,#10b981,#059669);color:#fff;font-size:12px;font-weight:700}
.lfrm button:disabled{opacity:.5}
#lerr{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#fca5a5;border-radius:7px;padding:7px;font-size:9px;font-weight:600;margin-top:8px;display:none}
@media(max-width:640px){.mgr{grid-template-columns:1fr}.dg{grid-template-columns:repeat(2,1fr)}}
</style>
</head>

function uBadge(u){return`<span class="urg ${u==='emergencia'?'emer':u==='urgente'?'urge':'prog'}">${u==='emergencia'?'🔴 Emergencia':u==='urgente'?'🟡 Urgente':'🔵 Programable'}</span>`}
function slaBadge(c){if(!c.sla_vence_at)return'';const h=Math.round((new Date(c.sla_vence_at)-Date.now())/36e5*10)/10;return h<0?'<span class="sla danger">⏱ Vencido</span>':h<2?`<span class="sla warn">⏱ ${h}h</span>`:`<span class="sla ok">⏱ ${h}h</span>`}
async function hashPwd(p){const d=new TextEncoder().encode(p+'HOUSE_CRM_SALT_2026');const b=await crypto.subtle.digest('SHA-256',d);return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('')}
async function hashFile(f){const b=await f.arrayBuffer();const h=await crypto.subtle.digest('SHA-256',b);return Array.from(new Uint8Array(h)).map(x=>x.toString(16).padStart(2,'0')).join('')}

/* ═══ FIND MY RECORDS ═══ */
function myInq(){
  // Primary: by usuario_id link
  let found = D.inqs.find(x=>x.usuario_id===U.id);
  if(found) return found;
  // Fallback: by phone
  if(U.telefono) found = D.inqs.find(x=>x.telefono_principal===U.telefono);
  if(found) return found;
  // Fallback: by email
  if(U.email) found = D.inqs.find(x=>x.email===U.email);
  if(found) return found;
  console.warn('myInq: no match found. U.id=',U.id,'inqs=',D.inqs.map(i=>({id:i.id,uid:i.usuario_id,tel:i.telefono_principal})));
  return null;
}
function myProf(){return D.profs.find(p=>p.usuario_id===U.id)}

/* ═══ NOTIFICATIONS ═══ */
function reqNotifPerm(){if('Notification' in window && Notification.permission==='default') Notification.requestPermission()}
function pushNotif(title,body){
  if('Notification' in window && Notification.permission==='granted'){
    try{new Notification(title,{body,vibrate:[300,200,300,200,300],requireInteraction:true,tag:'hp-'+Date.now()})}catch(e){}
  }
}
function megaAlert(tit,msg,type='info',btnTxt='Entendido'){
  // Vibrate aggressively
  if(navigator.vibrate) navigator.vibrate([500,200,500,200,500,200,800,300,800]);
  // Browser push notification (works with screen off on Android)
  pushNotif(tit,msg);
  // Audio alarm
  try{
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    const o=ac.createOscillator(),g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    o.frequency.value=type==='emer'?900:700;g.gain.value=0.4;o.start();
    setTimeout(()=>o.frequency.value=1200,200);
    setTimeout(()=>o.frequency.value=900,400);
    setTimeout(()=>o.frequency.value=1200,600);
    setTimeout(()=>o.stop(),1000);
  }catch(e){}
  // Fullscreen alert
  const el=document.createElement('div');
  el.className='mega '+type;
  el.innerHTML=`<div class="megab"><div class="megai">${type==='emer'?'🚨':type==='urge'?'⚠️':'📩'}</div><div class="megat">${tit}</div><div class="megam">${msg}</div><button class="megabt ${type}" onclick="this.closest('.mega').remove()">${btnTxt}</button></div>`;
  $('megas').appendChild(el);
  // Auto-remove after 30s
  setTimeout(()=>{if(el.parentNode)el.remove()},30000);
}

/* ═══ CLOUDINARY ═══ */
async function uploadToCloud(file){
  const fd=new FormData();
  fd.append('file',file);fd.append('upload_preset',CP);fd.append('folder','postventa');
  const res=await fetch('https://api.cloudinary.com/v1_1/'+CN+'/auto/upload',{method:'POST',body:fd});
  const d=await res.json();
  if(d.secure_url) return {url:d.secure_url, thumb:d.secure_url.replace('/upload/','/upload/w_400,c_fill,f_auto/')};
  throw new Error(d.error?.message||'Upload failed');
}
async function getGPS(){
  return new Promise(r=>{
    if(!navigator.geolocation) return r({lat:null,lng:null});
    navigator.geolocation.getCurrentPosition(
      p=>r({lat:p.coords.latitude,lng:p.coords.longitude}),
      ()=>r({lat:null,lng:null}),
      {timeout:5000}
    );
  });
}

async function login(){
  const usr=($('lin_usr').value||'').trim().toLowerCase();
  const pwd=($('lin_pwd').value||'').trim();
  if(!usr||!pwd){$('lerr').textContent='Ingresa usuario y contraseña';$('lerr').style.display='block';return}
  $('lin_btn').disabled=true;$('lerr').style.display='none';

/* ═══ POLLING (15s) ═══ */
function startPoll(){
  if(_poll) clearInterval(_poll);
  _poll = setInterval(async()=>{
    try{
      // Reload cases + alerts
      const[c1,c8]=await Promise.all([
        SB.from('pv_casos').select(_CASES_Q).order('created_at',{ascending:false}),
        SB.from('pv_alertas').select('*').order('created_at',{ascending:false}).limit(30)
      ]);
      D.casos=c1.data||[];
      D.als=c8.data||[];
      const cnt=D.als.filter(a=>!a.leida).length;
      $('bBdg').textContent=cnt;
      $('bBdg').style.display=cnt>0?'flex':'none';
      // New alert? Fire mega notification
      if(cnt>_alc && _alc>=0){
        const newest=D.als.filter(a=>!a.leida)[0];
        if(newest) megaAlert(newest.titulo, newest.mensaje||'Revisa la aplicación', newest.nivel==='rojo'?'emer':newest.nivel==='amarillo'?'urge':'info');
      }
      _alc=cnt;
      // Auto-refresh current view
      const curSec=document.querySelector('.mi.act')?.dataset.s;
      if(curSec && $('mdl').style.display==='none') ren(curSec);
    }catch(e){console.warn('Poll error:',e)}
  },15000);
}

/* ═══ CHAT HTML (shared utility) ═══ */
function buildChat(msgs, canal, casoId){
  const qrs = canal==='servicio'
    ? ['¿Hay mascota?','¿Parqueadero disponible?','Necesito repuesto']
    : ['¿Cuánto se demora?','Necesito reprogramar','Gracias por la gestión'];
  const uid = canal+'_'+casoId.slice(0,8);
  let h = `<div class="chatbox">`;
  if(!msgs.length) h += `<div style="text-align:center;color:var(--g400);font-size:9px;padding:10px">Sin mensajes aún</div>`;
  else msgs.forEach(m=>{
    const cls = m.autor_tipo==='sistema'?'sys' : m.autor_tipo==='inquilino'?'inq' : m.autor_tipo==='profesional'?'prof r' : 'adm r';
    h += `<div class="cmsg ${cls}"><div class="cbub">${m.mensaje}</div><div class="cmeta">${m.autor_nombre} · ${new Date(m.created_at).toLocaleString('es-CO',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}</div></div>`;
  });
  h += `</div>`;
  h += `<div class="qrw">${qrs.map(q=>`<span class="qr" onclick="document.getElementById('ci_${uid}').value='${q}'">${q}</span>`).join('')}</div>`;
  h += `<div class="cinp"><textarea id="ci_${uid}" placeholder="Escribir mensaje..."></textarea><button class="bt bsm bp" onclick="sendChat('${casoId}','${canal}','ci_${uid}')">→</button></div>`;
  return h;
}

async function sendChat(casoId, canal, inputId){
  const inp = $(inputId); if(!inp) return;
  const t = inp.value.trim(); if(!t) return;
  const tipo = U.rol==='usuario'?'inquilino' : U.rol==='civil'?'profesional' : 'admin';
  const{error} = await SB.from('pv_mensajes').insert({caso_id:casoId, autor_tipo:tipo, autor_id:U.id, autor_nombre:U.nombre, mensaje:t, canal});
  if(error){console.error('Chat send error:',error);toast('Error enviando','terr');return}
  inp.value='';
  toast('✓ Enviado');
  // Refresh current view
  const curSec = document.querySelector('.mi.act')?.dataset.s;
  if(curSec) ren(curSec);
  else if($('mdl').style.display!=='none'){
    // If in modal, re-open it
    openCasoAdmin(casoId);
  }
}

async function uploadPfPhoto(file){
  if(!file)return;
  toast('Subiendo foto...');
  try{
    const res = await uploadToCloud(file);
    const prof = myProf();
    if(prof) await SB.from('pv_profesionales').update({foto:res.url}).eq('id',prof.id);
    toast('✅ Foto actualizada');
    rPerfil();
  }catch(e){toast('Error subiendo foto','terr')}
}

async function savePerfil(){
  const nom=$('pf_nom').value.trim(), tel=$('pf_tel').value.trim(), tel2=$('pf_tel2').value.trim();
  if(!nom) return toast('Nombre obligatorio','twarn');
  await SB.from('pv_usuarios').update({nombre:nom,telefono:tel,telefono_secundario:tel2}).eq('id',U.id);
  U.nombre=nom;U.telefono=tel;U.telefono_secundario=tel2;
  sessionStorage.setItem('pv_u',JSON.stringify(U));
  $('uname').textContent=nom;$('muname').textContent=nom;
  // Sync with linked records
  if(U.rol==='usuario'){const inq=myInq();if(inq)await SB.from('pv_inquilinos').update({nombre:nom,telefono_principal:tel}).eq('id',inq.id)}
  if(U.rol==='civil'){
    const prof=myProf();
    const ced=$('pf_ced')?$('pf_ced').value.trim():'';
    if(prof)await SB.from('pv_profesionales').update({nombre:nom,telefono_principal:tel,numero_documento:ced}).eq('id',prof.id);
  }
  toast('✅ Perfil actualizado');
}

function rCasos(){
  const el=$('sec-casos');if(!el)return;
  el.innerHTML=`<div style="margin-bottom:8px"><button class="bt bp bsm" onclick="newCaso()">+ Nuevo</button></div><div class="tabs"><button class="tab act" onclick="switchCasosView('activos',this)">Activos</button><button class="tab" onclick="switchCasosView('todos',this)">Todos</button></div><div id="casosView"></div>`;
  switchCasosView('activos',el.querySelector('.tab.act'));
}

function switchCasosView(view,btn){
  document.querySelectorAll('#sec-casos .tab').forEach(t=>t.classList.remove('act'));
  if(btn)btn.classList.add('act');
  const el=$('casosView');
  const items = view==='activos' ? D.casos.filter(c=>!['cerrado','rechazado','cancelado'].includes(c.estado)) : D.casos;
  if(view==='activos'){
    let h='<div class="pw"><div class="pipe">';
    EST.filter(e=>e.id!=='cerrado').forEach(col=>{
      const ci=items.filter(c=>c.estado===col.id);
      h+=`<div class="pcol" data-c="${col.id}"><div class="pch"><span class="pct">${col.e} ${col.l}</span><span class="pcc">${ci.length}</span></div><div class="pcb">${ci.map(c=>{
        const pend=c.pendiente_aprobacion?'<br><span class="pend-badge">⏳ Aprobar</span>':'';
        return`<div class="pkc" onclick="openCasoAdmin('${c.id}')"><b>${tk(c.numero_caso)}</b> ${uBadge(c.urgencia)}<br>${c.categoria?.icono||''} ${c.problema?.nombre||''}<br><span style="color:var(--sub)">📍 ${c.propiedad?.direccion||''}</span>${c.profesional?`<br><span style="color:var(--green)">🔧 ${c.profesional.nombre}</span>`:''}${pend}</div>`
      }).join('')}</div></div>`;
    });
    h+='</div></div>';el.innerHTML=h;
  } else {
    el.innerHTML=items.length?items.map(c=>casoListItem(c)).join(''):'<div class="emp"><h3>Sin casos</h3></div>';
  }
}

/* NEW PROFESSIONAL */
function newProf(){
  $('mtt').textContent='Nuevo civil';$('mst').textContent='Registro rápido';
  $('mbd').innerHTML=`<div class="ff"><label class="ffl">Nombre *</label><input class="ffi" id="np_n"></div><div class="ff"><label class="ffl">Teléfono *</label><input class="ffi" id="np_t" type="tel"></div><div class="ff"><label class="ffl">Cédula</label><input class="ffi" id="np_c"></div><button class="bt bp" style="width:100%" onclick="saveNewProf()">✅ Registrar</button>`;
  $('mdl').style.display='flex';document.body.style.overflow='hidden';
}
async function saveNewProf(){
  const n=$('np_n').value.trim(),t=$('np_t').value.trim(),c=$('np_c').value.trim();
  if(!n||!t)return toast('Nombre y teléfono obligatorios','twarn');
  const login=n.toLowerCase().replace(/\s+/g,'');
  const h=await hashPwd(login+'123');
  const{data:usr}=await SB.from('pv_usuarios').insert({nombre:n,usuario:login,password_hash:h,rol:'civil',telefono:t,activo:true}).select().single();
  await SB.from('pv_profesionales').insert({usuario_id:usr?.id,nombre:n,telefono_principal:t,numero_documento:c,especialidades:[],ciudad:'Pereira',disponible:true});
  toast('✅ Civil creado. Login: '+login+' / '+login+'123');
  cm();
  // Reload profs
  const{data:profs}=await SB.from('pv_profesionales').select('*').eq('activo',true).order('nombre');
  D.profs=profs||[];
  ren('profesionales');
}

/* OPEN CASO DETAIL (ADMIN/POSTVENTA) */
async function openCasoAdmin(id){
  const c=D.casos.find(x=>x.id===id);
  if(!c){toast('Caso no encontrado','twarn');return}
  
  $('mtt').textContent=tk(c.numero_caso);
  $('mst').textContent=(c.categoria?.icono||'')+' '+(c.problema?.nombre||c.categoria?.nombre||'');
  
  // Load evidence, checklist, messages
  let ev=[],ck=[],ms=[];
  try{
    const[r1,r2,r3]=await Promise.all([
      SB.from('pv_evidencias').select('*').eq('caso_id',id).order('created_at'),
      SB.from('pv_checklist').select('*').eq('caso_id',id).order('orden'),
      SB.from('pv_mensajes').select('*').eq('caso_id',id).order('created_at')
    ]);
    ev=r1.data||[];ck=r2.data||[];ms=r3.data||[];
  }catch(e){console.warn('Error loading caso details:',e)}

  const eObj=EST.find(e=>e.id===c.estado);
  let b='';

  // Header badges
  b+=`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px"><span class="tkn">${tk(c.numero_caso)}</span>${uBadge(c.urgencia)}<span style="padding:2px 6px;border-radius:6px;font-size:8px;font-weight:700;background:var(--cd2);border:1px solid var(--brd)">${eObj?eObj.e+' '+eObj.l:c.estado}</span>${slaBadge(c)}${c.pendiente_aprobacion?'<span class="pend-badge">⏳ Pendiente aprobación</span>':''}</div>`;

  // Info
  b+=`<div class="msc"><div class="msct">📋 Información</div><div class="mgr"><div class="mf"><div class="mfl">Propiedad</div><div class="mfv">📍 ${c.propiedad?.direccion||'?'}</div></div><div class="mf"><div class="mfl">Inquilino</div><div class="mfv">👤 ${c.inquilino?.nombre||''} · ${c.inquilino?.telefono_principal||''}</div></div><div class="mf ful"><div class="mfl">Problema</div><div class="mfv">${c.descripcion||'—'}</div></div><div class="mf"><div class="mfl">Civil</div><div class="mfv">${c.profesional?'🔧 '+c.profesional.nombre+(c.profesional.numero_documento?' · CC '+c.profesional.numero_documento:''):'Sin asignar'}</div></div><div class="mf"><div class="mfl">Costo</div><div class="mfv">${fm(c.costo_estimado)}</div></div></div></div>`;

  // Evidence
  if(ev.length) b+=`<div class="msc"><div class="msct">📷 Evidencias (${ev.length})</div><div style="display:flex;gap:3px;flex-wrap:wrap">${ev.map(e=>`<img src="${e.url_thumb||e.url}" style="width:50px;height:50px;object-fit:cover;border-radius:5px;cursor:pointer" onclick="window.open('${e.url}','_blank')">`).join('')}</div></div>`;

  // Checklist
  if(ck.length) b+=`<div class="msc"><div class="msct">✅ Checklist (${ck.filter(i=>i.completado).length}/${ck.length})</div>${ck.map(i=>`<div class="cki"><div class="ckb ${i.completado?'dn':''}" onclick="toggleCheck('${i.id}','${id}')">${i.completado?'✓':''}</div><div class="cktx ${i.completado?'dn':''}">${i.item}</div>${i.obligatorio?'<span style="font-size:7px;color:var(--red);font-weight:700">REQ</span>':''}</div>`).join('')}</div>`;

  // Chat (dual channels)
  const msSrv=ms.filter(m=>m.canal!=='administrativo');
  const msAdm=ms.filter(m=>m.canal==='administrativo');
  b+=`<div class="msc"><div class="msct">💬 Chat</div>`;
  b+=`<div class="tabs"><button class="tab act" onclick="$('chSrv_m').style.display='block';$('chAdm_m').style.display='none';this.classList.add('act');this.nextElementSibling.classList.remove('act')">Técnico (${msSrv.length})</button><button class="tab" onclick="$('chAdm_m').style.display='block';$('chSrv_m').style.display='none';this.classList.add('act');this.previousElementSibling.classList.remove('act')">Inmobiliaria (${msAdm.length})</button></div>`;
  b+=`<div id="chSrv_m">${buildChat(msSrv,'servicio',id)}</div>`;
  b+=`<div id="chAdm_m" style="display:none">${buildChat(msAdm,'administrativo',id)}</div></div>`;

  // Actions
  if(!['cerrado','rechazado','cancelado'].includes(c.estado)){
    b+=`<div class="msc"><div class="msct">⚡ Acciones</div>`;

    // Approve button if pending
    if(c.pendiente_aprobacion){
      b+=`<div style="display:flex;gap:4px;margin-bottom:6px"><button class="bt bsm bgr" onclick="approveAssignment('${id}')">✅ Aprobar asignación de ${c.profesional?.nombre||'civil'}</button><button class="bt bsm bd" onclick="rejectAssignment('${id}')">❌ Rechazar</button></div>`;
    }

    // State transitions
    const nx={reportado:['validado','rechazado'],validado:['asignado','rechazado'],asignado:['en_camino','cancelado'],en_camino:['en_ejecucion'],en_ejecucion:['completado'],completado:['cerrado']}[c.estado]||[];
    if(nx.length && !c.pendiente_aprobacion) b+=`<div style="display:flex;gap:3px;flex-wrap:wrap;margin-bottom:5px">${nx.map(n=>{const e2=EST.find(e=>e.id===n)||{e:'',l:n};return`<button class="bt bsm ${n==='rechazado'||n==='cancelado'?'bd':'bgr'}" onclick="changeEstado('${id}','${n}')">${e2.e} ${e2.l}</button>`}).join('')}</div>`;

    // Assign/Reassign
    if(['reportado','validado','asignado','en_camino'].includes(c.estado) && !c.pendiente_aprobacion){
      b+=`<div style="margin-bottom:5px"><div style="font-size:8px;font-weight:700;color:var(--sub);margin-bottom:2px">${c.profesional_id?'🔄 REASIGNAR':'👤 ASIGNAR'} CIVIL</div><select class="ffi" id="selProf"><option value="">Seleccionar...</option>${D.profs.filter(p=>p.disponible&&p.id!==c.profesional_id).map(p=>`<option value="${p.id}">🔧 ${p.nombre} ⭐${p.rating_promedio}</option>`).join('')}</select><div style="display:flex;gap:3px;margin-top:3px"><button class="bt bsm bp" onclick="assignProf('${id}',${!!c.profesional_id})">Asignar</button><button class="bt bsm bgr" onclick="newProf()">+ Emergencia</button></div>${c.profesional_id?`<div class="ff" style="margin-top:4px"><label class="ffl">Motivo reasignación</label><input class="ffi" id="motivoR" placeholder="No contestó..."></div>`:''}</div>`;
    }

    // Payment responsibility
    b+=`<select class="ffi" onchange="changeResp('${id}',this.value)"><option value="por_definir" ${c.responsable_pago==='por_definir'?'selected':''}>Pago: Por definir</option><option value="propietario" ${c.responsable_pago==='propietario'?'selected':''}>Propietario</option><option value="inquilino" ${c.responsable_pago==='inquilino'?'selected':''}>Inquilino</option><option value="compartido" ${c.responsable_pago==='compartido'?'selected':''}>Compartido</option></select>`;
    b+=`</div>`;
  }

  $('mbd').innerHTML=b;
  $('mdl').style.display='flex';document.body.style.overflow='hidden';
}

async function changeEstado(id,estado){await SB.from('pv_casos').update({estado}).eq('id',id);toast('✅');cm();D.casos=await fetchCases();const cur=document.querySelector('.mi.act')?.dataset.s;if(cur)ren(cur)}

async function assignProf(casoId,isReassign){
  const pId=$('selProf')?.value;if(!pId)return toast('Selecciona un civil','twarn');
  const upd={profesional_id:pId,asignado_por:U.id,estado:'asignado'};
  if(isReassign){
    const c=D.casos.find(x=>x.id===casoId);
    const mot=$('motivoR')?$('motivoR').value:'';
    upd.profesional_anterior_id=c?.profesional_id;
    upd.motivo_reasignacion=mot;
    upd.reasignaciones=(c?.reasignaciones||0)+1;
    await SB.from('pv_mensajes').insert({caso_id:casoId,autor_tipo:'sistema',autor_nombre:'Sistema',mensaje:'⚠️ Reasignación de profesional. '+(mot||''),canal:'servicio'});
  }
  await SB.from('pv_casos').update(upd).eq('id',casoId);
  const prof=D.profs.find(p=>p.id===pId);
  await SB.from('pv_alertas').insert({tipo:'asignacion',nivel:'verde',titulo:'👤 '+(prof?.nombre||'')+' asignado a tu caso',mensaje:'Un profesional fue asignado para atenderte.',caso_id:casoId,para_rol:'usuario'});
  toast('✅');cm();
  await changeEstado(casoId,'asignado');
}

async function approveAssignment(id){
  await SB.from('pv_casos').update({pendiente_aprobacion:false,estado:'asignado'}).eq('id',id);
  const c=D.casos.find(x=>x.id===id);
  await SB.from('pv_alertas').insert({tipo:'aprobacion',nivel:'verde',titulo:'✅ Tu solicitud fue aprobada',mensaje:'El profesional '+(c?.profesional?.nombre||'')+' puede proceder.',caso_id:id,para_rol:'civil'});
  await SB.from('pv_alertas').insert({tipo:'asignacion',nivel:'verde',titulo:'👤 Profesional asignado',mensaje:(c?.profesional?.nombre||'')+' fue asignado a tu caso.',caso_id:id,para_rol:'usuario'});
  toast('✅ Aprobado');cm();
  D.casos=await fetchCases();ren('dash');
}
async function rejectAssignment(id){
  await SB.from('pv_casos').update({pendiente_aprobacion:false,profesional_id:null,estado:'reportado'}).eq('id',id);
  toast('❌ Rechazado');cm();
  D.casos=await fetchCases();ren('dash');
}

async function changeResp(id,v){await SB.from('pv_casos').update({responsable_pago:v}).eq('id',id);toast('✅')}
async function toggleCheck(ckId,casoId){const{data}=await SB.from('pv_checklist').select('completado').eq('id',ckId).single();if(!data)return;await SB.from('pv_checklist').update({completado:!data.completado,completado_at:!data.completado?new Date().toISOString():null}).eq('id',ckId);openCasoAdmin(casoId)}

/* NEW CASO (admin/postventa) */
function newCaso(){
  $('mtt').textContent='Nuevo caso';$('mst').textContent='Registrar reporte';
  $('mbd').innerHTML=`<div class="ff"><label class="ffl">Propiedad *</label><select class="ffi" id="nc_p" onchange="ncPropChanged()"><option value="">Seleccionar...</option>${D.props.map(p=>`<option value="${p.id}">${p.codigo_interno||''} · ${p.direccion}</option>`).join('')}</select></div><div class="ff"><label class="ffl">Inquilino *</label><select class="ffi" id="nc_i"><option value="">Primero propiedad</option></select></div><div class="ff"><label class="ffl">Sistema *</label><select class="ffi" id="nc_c" onchange="ncCatChanged()"><option value="">Seleccionar...</option>${D.cats.map(c=>`<option value="${c.id}">${c.icono} ${c.nombre}</option>`).join('')}</select></div><div class="ff"><label class="ffl">Problema</label><select class="ffi" id="nc_pr"><option value="">Primero sistema</option></select></div><div class="ff"><label class="ffl">Descripción *</label><textarea class="ffi" id="nc_d" style="min-height:50px"></textarea></div><button class="bt bp" style="width:100%" onclick="saveNewCaso()">📩 Crear</button>`;
  $('mdl').style.display='flex';document.body.style.overflow='hidden';
}
function ncPropChanged(){$('nc_i').innerHTML='<option value="">Seleccionar...</option>'+D.inqs.filter(i=>i.propiedad_id===$('nc_p').value).map(i=>`<option value="${i.id}">${i.nombre} ${i.apellido||''}</option>`).join('')}
function ncCatChanged(){$('nc_pr').innerHTML='<option value="">Seleccionar...</option>'+D.probs.filter(p=>p.categoria_id===$('nc_c').value).map(p=>`<option value="${p.id}">${p.nombre}</option>`).join('')}
async function saveNewCaso(){
  const pId=$('nc_p').value,iId=$('nc_i').value,cId=$('nc_c').value,prId=$('nc_pr').value,d=$('nc_d').value.trim();
  if(!pId||!iId||!cId||!d)return toast('Completa todos los campos','twarn');
  const prob=D.probs.find(p=>p.id===prId);
  const{data:nc,error}=await SB.from('pv_casos').insert({propiedad_id:pId,inquilino_id:iId,categoria_id:cId,problema_id:prId||null,descripcion:d,urgencia:prob?prob.urgencia_auto:'programable',reportado_por:U.id}).select().single();
  if(error)return toast('Error: '+error.message,'terr');
  await SB.from('pv_alertas').insert({tipo:'caso_nuevo',nivel:prob?.urgencia_auto==='emergencia'?'rojo':'amarillo',titulo:'🚨 '+(prob?.nombre||'Nuevo reporte'),mensaje:tk(nc.numero_caso)+' creado',caso_id:nc.id,para_rol:'postventa'});
  toast('📩 Caso creado');cm();
  D.casos=await fetchCases();go('casos');
}

function rOrdenes(){
  const el=$('sec-ordenes');if(!el)return;
  const available=D.casos.filter(c=>(c.estado==='reportado'||c.estado==='validado')&&!c.profesional_id);
  let h=`<div style="padding:12px;background:linear-gradient(135deg,var(--purple),#7c3aed);border-radius:var(--r);margin-bottom:8px;color:#fff"><div style="font-family:Fraunces,serif;font-size:16px;font-weight:800">Órdenes disponibles</div><div style="font-size:10px;opacity:.7">${available.length} orden(es)</div></div>`;
  if(!available.length){h+='<div class="emp"><h3>Sin órdenes disponibles</h3><p>Cuando un cliente reporte, aparecerá aquí</p></div>';el.innerHTML=h;return}
  available.forEach(c=>{
    const mins=Math.round((Date.now()-new Date(c.created_at).getTime())/60000);
    h+=`<div class="job ${c.urgencia==='emergencia'?'emer':c.urgencia==='urgente'?'urge':''}"><div class="jobh"><div style="display:flex;justify-content:space-between"><b>${tk(c.numero_caso)}</b>${uBadge(c.urgencia)}</div><div style="font-size:10px;font-weight:700;margin-top:2px">${c.categoria?.icono||''} ${c.problema?.nombre||''}</div>${mins>=30?`<div style="color:var(--red);font-size:9px;font-weight:800;margin-top:2px">⏰ Hace ${mins} min</div>`:''}</div><div class="jobb"><div style="display:flex;gap:6px;padding:8px;background:var(--cd2);border-radius:7px;margin-bottom:6px;font-size:11px"><span>📍</span><div><b>${c.propiedad?.direccion||'?'}</b><div style="font-size:9px;color:var(--sub)">${c.propiedad?.ciudad||''}</div></div></div><div style="font-size:10px;margin-bottom:4px">${c.descripcion}</div><div style="font-size:9px;color:var(--sub);margin-bottom:6px">👤 ${c.inquilino?.nombre||''} · 📱 ${c.inquilino?.telefono_principal||''}</div><a href="tel:${c.inquilino?.telefono_principal||''}" class="callb">📞 Llamar al inquilino</a><div class="ff"><label class="ffl">Costo estimado (opcional)</label><input class="ffi" id="price_${c.id}" type="number" placeholder="150000"></div><button class="jobbt take" onclick="takeOrder('${c.id}')">🖐 Tomar esta orden</button></div></div>`;
  });
  el.innerHTML=h;
}

async function takeOrder(casoId){
  const prof=myProf();if(!prof)return toast('Sin perfil de civil','terr');
  const priceEl=$('price_'+casoId);
  const price=priceEl?parseInt(priceEl.value)||0:0;
  // Set profesional but mark as pending approval
  await SB.from('pv_casos').update({profesional_id:prof.id,pendiente_aprobacion:true,costo_estimado:price||null}).eq('id',casoId);
  // Alert postventa for approval
  await SB.from('pv_alertas').insert({tipo:'solicitud_aprobacion',nivel:'amarillo',titulo:'⏳ '+prof.nombre+' quiere tomar '+tk(D.casos.find(x=>x.id===casoId)?.numero_caso||0),mensaje:'Civil solicita aprobación para este caso.'+(price?' Costo: $'+price.toLocaleString('es-CO'):''),caso_id:casoId,para_rol:'postventa'});
  await SB.from('pv_mensajes').insert({caso_id:casoId,autor_tipo:'sistema',autor_nombre:'Sistema',mensaje:'⏳ '+prof.nombre+' solicitó tomar esta orden. Pendiente aprobación de postventa.',canal:'servicio'});
  toast('✅ Solicitud enviada — esperando aprobación de postventa');
  D.casos=await fetchCases();go('mis_trabajos');
}

function rMisTrabajos(){
  const el=$('sec-mis_trabajos');if(!el)return;
  const prof=myProf();
  const mc=prof?D.casos.filter(c=>c.profesional_id===prof.id&&!['cerrado','rechazado','cancelado'].includes(c.estado)):[];
  let h=`<div style="padding:12px;background:linear-gradient(135deg,var(--green),#059669);border-radius:var(--r);margin-bottom:8px;color:#fff"><div style="font-family:Fraunces,serif;font-size:16px;font-weight:800">Mis trabajos</div><div style="font-size:10px;opacity:.7">${mc.length} activo(s)</div></div>`;
  if(!mc.length){h+='<div class="emp"><h3>Sin trabajos asignados</h3><p>Toma una orden en "Órdenes disponibles"</p></div>';el.innerHTML=h;return}
  mc.forEach(c=>{
    const pending=c.pendiente_aprobacion?'<div style="padding:6px;background:var(--goldbg);border:1px solid var(--yb);border-radius:6px;font-size:10px;color:#92400e;margin-bottom:6px">⏳ Esperando aprobación de postventa</div>':'';
    h+=`<div class="job ${c.urgencia==='emergencia'?'emer':''}"><div class="jobh"><div style="display:flex;justify-content:space-between"><b>${tk(c.numero_caso)}</b>${uBadge(c.urgencia)}</div><div style="font-size:10px;font-weight:700;margin-top:2px">${c.categoria?.icono||''} ${c.problema?.nombre||''}</div></div><div class="jobb">${pending}<div style="display:flex;gap:6px;padding:8px;background:var(--cd2);border-radius:7px;margin-bottom:6px"><span>📍</span><div><b style="font-size:11px">${c.propiedad?.direccion||'?'}</b></div></div><div style="font-size:10px;margin-bottom:4px">${c.descripcion}</div><a href="tel:${c.inquilino?.telefono_principal||''}" class="callb">📞 Llamar a ${c.inquilino?.nombre||''} · ${c.inquilino?.telefono_principal||''}</a>${!c.pendiente_aprobacion?
      (c.estado==='asignado'?`<button class="jobbt go" onclick="civilChangeState('${c.id}','en_camino')">🚗 Voy en camino</button>`:
       c.estado==='en_camino'?`<button class="jobbt arr" onclick="civilChangeState('${c.id}','en_ejecucion')">📍 Ya llegué — Iniciar</button>`:
       c.estado==='en_ejecucion'?`<div class="ff"><label class="ffl">Costo final</label><input class="ffi" id="cf_${c.id}" type="number" value="${c.costo_final||c.costo_estimado||''}" placeholder="Monto"></div><button class="jobbt dn" onclick="civilComplete('${c.id}')">✅ Trabajo completado</button>`:'')
    :''}<div style="margin-top:6px"><div style="font-size:8px;font-weight:700;color:var(--sub);margin-bottom:3px">💬 CHAT CON INQUILINO</div><div id="civilChat_${c.id}"><div style="color:var(--g400);font-size:9px">Cargando...</div></div></div></div></div>`;
  });
  el.innerHTML=h;
  // Load chats (non-blocking)
  mc.forEach(c=>{
    SB.from('pv_mensajes').select('*').eq('caso_id',c.id).eq('canal','servicio').order('created_at')
      .then(({data:ms})=>{const chatEl=$('civilChat_'+c.id);if(chatEl)chatEl.innerHTML=buildChat(ms||[],'servicio',c.id)})
      .catch(e=>console.warn('Chat load error:',e));
  });
}

function rMiHist(){
  const el=$('sec-mi_hist');if(!el)return;
  const prof=myProf();
  const cerrados=prof?D.casos.filter(c=>c.profesional_id===prof.id&&c.estado==='cerrado'):[];
  el.innerHTML=cerrados.length?cerrados.map(x=>`<div class="cli"><div class="cli-i">✅</div><div class="cli-c"><div class="cli-t">${tk(x.numero_caso)} · ${x.problema?.nombre||''}</div><div class="cli-s">📍 ${x.propiedad?.direccion||''}</div></div></div>`).join(''):'<div class="emp"><h3>Sin historial</h3></div>';
}

async function civilChangeState(id,estado){
  await SB.from('pv_casos').update({estado}).eq('id',id);toast('✅');
  D.casos=await fetchCases();rMisTrabajos();
}

async function civilComplete(id){
  const ok=await cfShow('✅','¿Completar trabajo?','Confirma que terminaste la reparación');
  if(!ok)return;
  const cfEl=$('cf_'+id);const cf=cfEl?parseInt(cfEl.value)||0:0;
  try{await SB.from('pv_casos').update({estado:'completado',costo_final:cf||null}).eq('id',id);toast('✅ Completado');
  D.casos=await fetchCases();rMisTrabajos();}
  catch(e){toast('Faltan fotos o checklist','twarn')}
}

/* ═══════════════════════════════════════════
   CLIENT (USUARIO) VIEWS
   ═══════════════════════════════════════════ */

function rMiInmueble(){
  const el=$('sec-mi_inm');if(!el)return;
  const mI=myInq();
  if(!mI){
    el.innerHTML=`<div class="emp"><h3>Inmueble no vinculado</h3><p>Contacta a la inmobiliaria para vincular tu cuenta.<br>Tu ID: ${U.id.slice(0,8)}</p></div>`;
    return;
  }
  const p=mI.propiedad;
  const mc=D.casos.filter(c=>c.inquilino_id===mI.id && !['cerrado','rechazado','cancelado'].includes(c.estado));
  const cerr=D.casos.filter(c=>c.inquilino_id===mI.id && c.estado==='cerrado');

  let h=`<div style="padding:12px;background:linear-gradient(135deg,var(--b700),var(--b600));border-radius:var(--r);margin-bottom:10px;color:#fff"><div style="font-family:Fraunces,serif;font-size:16px;font-weight:800">Hola, ${mI.nombre} 👋</div><div style="font-size:10px;opacity:.7">📍 ${p?p.direccion+', '+p.ciudad:''}</div></div>`;

  // Report button
  h+=`<button class="rbtn" onclick="clientReport('${mI.id}','${mI.propiedad_id}')"><span style="font-size:24px">🚨</span><div><div style="font-family:Fraunces,serif;font-size:14px;font-weight:800">Reportar problema</div><div style="font-size:9px;opacity:.75;margin-top:1px">Reporta un daño o emergencia</div></div></button>`;

  // Active cases
  if(mc.length){
    h+=`<div style="font-family:Fraunces,serif;font-size:14px;font-weight:700;margin-bottom:6px">Casos activos (${mc.length})</div>`;
    mc.forEach((c,i)=> h += buildExpandableCase(c, i===0));
  }

  // Closed
  if(cerr.length){
    h+=`<div style="font-family:Fraunces,serif;font-size:14px;font-weight:700;margin:10px 0 6px">Resueltos</div>`;
    cerr.forEach(c=> h+=`<div class="cli"><div class="cli-i">✅</div><div class="cli-c"><div class="cli-t">${tk(c.numero_caso)} · ${c.problema?.nombre||''}</div></div></div>`);
  }

  el.innerHTML=h;
  // Load chats for active cases (non-blocking)
  loadClientChats(mc);
}

function rMisReportes(){
  const el=$('sec-mis_rep');if(!el)return;
  const mI=myInq();
  if(!mI){el.innerHTML='<div class="emp"><h3>Sin reportes</h3></div>';return}
  const todos=D.casos.filter(c=>c.inquilino_id===mI.id);

  let h=`<div style="font-family:Fraunces,serif;font-size:14px;font-weight:700;margin-bottom:8px">Mis reportes (${todos.length})</div>`;
  if(!todos.length){el.innerHTML=h+'<div class="emp"><h3>Aún no has reportado nada</h3><p>Usa el botón en Mi inmueble</p></div>';return}
  todos.forEach((c,i)=> h += buildExpandableCase(c, i===0));
  el.innerHTML=h;
  loadClientChats(todos);
}

function buildExpandableCase(c, open){
  const ex=ETXT[c.estado]||{};
  const steps=['reportado','validado','asignado','en_camino','en_ejecucion','completado','cerrado'];
  const ci=steps.indexOf(c.estado);

  // Timeline
  let tl='<div class="prg">';
  steps.forEach((s,i)=>{
    const e=ETXT[s]||{};
    const cls=i<ci?'done':i===ci?'active':'future';
    let ts='';
    if(i<=ci){const t=c[s+'_at']||c.created_at;if(t)ts=new Date(t).toLocaleString('es-CO',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}
    let reas='';
    if(s==='asignado'&&c.reasignaciones>0) reas=`<div style="margin:2px 0;padding:3px 5px;background:var(--goldbg);border:1px solid var(--yb);border-radius:4px;font-size:8px;color:#92400e">⚠️ Reasignado${c.motivo_reasignacion?' — '+c.motivo_reasignacion:''}</div>`;
    tl+=`<div class="prs ${cls}"><div class="prd">${e.i||'○'}</div><div class="pri"><div class="prt">${e.t||s}</div>${i<=ci?`<div class="prds">${e.d||''}</div>`:''}<div class="prtm">${ts}</div>${reas}</div></div>`;
  });
  tl+='</div>';

  // Professional info
  let profInfo='';
  if(c.profesional){
    profInfo=`<div style="margin-top:6px;padding:6px;background:var(--greenbg);border:1px solid var(--gb);border-radius:6px;font-size:10px;display:flex;align-items:center;gap:6px">${c.profesional.foto?`<img src="${c.profesional.foto}" style="width:32px;height:32px;border-radius:50%;object-fit:cover">`:'🔧'} <div><b>${c.profesional.nombre}</b>${c.profesional.numero_documento?' · CC '+c.profesional.numero_documento:''}<br>⭐ ${c.profesional.rating_promedio}</div></div>`;
  }

  // Rating
  let rating='';
  if(c.estado==='completado'&&!c.calificacion_inquilino){
    rating=`<div style="text-align:center;padding:10px;background:var(--goldbg);border:1px solid var(--yb);border-radius:7px;margin-top:6px"><div style="font-size:11px;font-weight:800;margin-bottom:4px">⭐ Califica el servicio</div><div style="display:flex;justify-content:center;gap:8px">${[1,2,3,4,5].map(n=>`<button style="font-size:24px;background:none;border:none;cursor:pointer" onclick="clientRate('${c.id}',${n})">⭐</button>`).join('')}</div></div>`;
  }
  if(c.calificacion_inquilino) rating=`<div style="text-align:center;font-size:11px;color:var(--green);font-weight:700;margin-top:4px">${'⭐'.repeat(c.calificacion_inquilino)}</div>`;

  return `<div class="exp" id="ec_${c.id}">
    <div class="exph" onclick="toggleExpand('${c.id}')">
      <span style="font-size:18px">${ex.i||'📩'}</span>
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap"><span class="tkn">${tk(c.numero_caso)}</span>${uBadge(c.urgencia)}</div>
        <div style="font-size:12px;font-weight:700;margin-top:2px">${ex.t||c.estado}</div>
        <div style="font-size:9px;color:var(--sub)">${c.categoria?.icono||''} ${c.problema?.nombre||''}</div>
      </div>
      <span class="expa ${open?'open':''}">›</span>
    </div>
    <div class="expb ${open?'show':''}">
      ${tl}${profInfo}${rating}
      <div style="margin-top:8px" id="clientChat_${c.id}"><div style="color:var(--g400);font-size:9px">Cargando chat...</div></div>
    </div>
  </div>`;
}

function toggleExpand(id){
  const b=document.querySelector('#ec_'+id+' .expb');
  const a=document.querySelector('#ec_'+id+' .expa');
  if(b)b.classList.toggle('show');
  if(a)a.classList.toggle('open');
}

function loadClientChats(cases){
  cases.forEach(c=>{
    SB.from('pv_mensajes').select('*').eq('caso_id',c.id).order('created_at')
      .then(({data:ms})=>{
        const msSrv=(ms||[]).filter(m=>m.canal!=='administrativo');
        const msAdm=(ms||[]).filter(m=>m.canal==='administrativo');
        const chatEl=$('clientChat_'+c.id);
        if(!chatEl)return;
        chatEl.innerHTML=`
          <div class="tabs">
            <button class="tab act" onclick="this.classList.add('act');this.nextElementSibling.classList.remove('act');this.parentElement.nextElementSibling.style.display='block';this.parentElement.nextElementSibling.nextElementSibling.style.display='none'">Técnico (${msSrv.length})</button>
            <button class="tab" onclick="this.classList.add('act');this.previousElementSibling.classList.remove('act');this.parentElement.nextElementSibling.style.display='none';this.parentElement.nextElementSibling.nextElementSibling.style.display='block'">Inmobiliaria (${msAdm.length})</button>
          </div>
          <div>${buildChat(msSrv,'servicio',c.id)}</div>
          <div style="display:none">${buildChat(msAdm,'administrativo',c.id)}</div>`;
      })
      .catch(e=>{
        console.warn('Client chat load error for',c.id,e);
        const chatEl=$('clientChat_'+c.id);
        if(chatEl) chatEl.innerHTML='<div style="color:var(--g400);font-size:9px">Chat no disponible</div>';
      });
  });
}

async function clientRate(id,n){
  await SB.from('pv_casos').update({calificacion_inquilino:n}).eq('id',id);
  toast('⭐ ¡Gracias por calificar!');
  D.casos=await fetchCases();
  rMiInmueble();
}

/* CLIENT REPORT */
function clientReport(inqId, propId){
  $('mtt').textContent='Reportar problema';
  $('mst').textContent='Cuéntanos qué pasó';
  _pf=[];

  let b = `
    <div class="ff"><label class="ffl">¿Qué se dañó? <span class="ffr">*</span></label>
      <select class="ffi" id="cr_cat" onchange="onReportCatChange()"><option value="">Seleccionar...</option>${D.cats.map(c=>`<option value="${c.id}">${c.icono} ${c.nombre}</option>`).join('')}</select></div>
    <div class="ff"><label class="ffl">Problema específico</label>
      <select class="ffi" id="cr_prob" onchange="onReportProbChange()"><option value="">Primero selecciona arriba</option></select></div>
    <div id="reportAlert"></div>
    <div id="reportGuide"></div>
    <div class="ff"><label class="ffl">Describe el problema <span class="ffr">*</span></label>
      <textarea class="ffi" id="cr_desc" style="min-height:60px" placeholder="Explica qué pasó, desde cuándo, qué tan grave es..."></textarea></div>
    <div class="ff"><label class="ffl">¿Dónde exactamente?</label>
      <input class="ffi" id="cr_ubic" placeholder="Baño principal, cocina..."></div>
    <div class="ff"><label class="ffl">📷 Fotos y videos del daño</label>
      <div class="fzone" id="photoZone"><div style="font-size:20px">📷</div><div style="font-size:10px;color:var(--sub);font-weight:600">Toca para agregar fotos</div><div style="font-size:8px;color:var(--g400)">JPG, PNG, MP4 · Máx 10MB</div></div>
      <input type="file" id="photoInput" multiple accept="image/*,video/*" style="display:none">
      <div class="fprog" id="photoProg"><span style="width:0%"></span></div>
      <div class="fprev" id="photoPreview"></div>
    </div>
    <button class="bt bp" style="width:100%;padding:11px;font-size:13px" onclick="saveClientReport('${inqId}','${propId}')">📩 Enviar reporte</button>`;

  $('mbd').innerHTML=b;
  $('mdl').style.display='flex';document.body.style.overflow='hidden';

  // Bind photo input
  setTimeout(()=>{
    const zone=$('photoZone'), inp=$('photoInput');
    if(zone&&inp){zone.onclick=()=>inp.click();inp.onchange=function(){uploadPhotos(this.files)}}
  },100);
}

function onReportCatChange(){
  const catId=$('cr_cat').value;
  $('cr_prob').innerHTML='<option value="">Seleccionar...</option>'+D.probs.filter(p=>p.categoria_id===catId).map(p=>`<option value="${p.id}">${p.nombre}</option>`).join('');
  const g=FGUIDE[catId]||FGUIDE.otro;
  $('reportGuide').innerHTML=`<div class="fguide"><b>📷 Guía: qué fotografiar</b>${g.items.map((it,i)=>`<p>${i+1}. ${it}</p>`).join('')}<div class="tip">💡 ${g.tip}</div></div>`;
}

function onReportProbChange(){
  const p=D.probs.find(x=>x.id===$('cr_prob').value);
  if(p?.alerta_seguridad) $('reportAlert').innerHTML=`<div style="padding:8px;background:var(--redbg);border:2px solid var(--rb);border-radius:7px;margin-bottom:8px;font-size:10px;color:var(--red);font-weight:700">🚨 ${p.alerta_seguridad}</div>`;
  else $('reportAlert').innerHTML='';
}

async function uploadPhotos(files){
  const prog=$('photoProg'),prev=$('photoPreview');
  prog.style.display='block';
  const gps=await getGPS();
  for(let i=0;i<files.length;i++){
    prog.querySelector('span').style.width=Math.round((i+1)/files.length*100)+'%';
    try{
      const hash=await hashFile(files[i]);
      const res=await uploadToCloud(files[i]);
      _pf.push({...res,hash,lat:gps.lat,lng:gps.lng});
      const d=document.createElement('div');d.className='fpi';
      d.innerHTML=`<img src="${res.thumb}">`;
      prev.appendChild(d);
    }catch(e){toast('Error subiendo: '+files[i].name,'terr')}
  }
  setTimeout(()=>{prog.style.display='none';prog.querySelector('span').style.width='0%'},800);
  if(_pf.length) toast('📷 '+_pf.length+' archivo(s) subidos');
}

async function saveClientReport(inqId, propId){
  const catId=$('cr_cat').value;
  const probId=$('cr_prob').value;
  const desc=$('cr_desc').value.trim();
  const ubic=$('cr_ubic').value.trim();

  if(!catId) return toast('Selecciona qué se dañó','twarn');
  if(!desc) return toast('Describe el problema','twarn');

  const prob=D.probs.find(p=>p.id===probId);

  console.log('Saving report:', {propId, inqId, catId, probId, desc});

  const{data:nc,error}=await SB.from('pv_casos').insert({
    propiedad_id:propId,
    inquilino_id:inqId,
    categoria_id:catId,
    problema_id:probId||null,
    descripcion:desc,
    urgencia:prob?prob.urgencia_auto:'programable',
    ubicacion_especifica:ubic||null,
    reportado_por:U.id
  }).select().single();

  if(error){
    console.error('SAVE ERROR:',error);
    toast('Error guardando: '+error.message,'terr');
    return;
  }

  console.log('Report saved:',nc);

  // Save photos
  for(const f of _pf){
    await SB.from('pv_evidencias').insert({caso_id:nc.id,tipo:'reporte',url:f.url,url_thumb:f.thumb,hash_sha256:f.hash,gps_lat:f.lat,gps_lng:f.lng,subido_por:'inquilino'});
  }
  _pf=[];

  // Alerts for all: postventa + civiles
  await SB.from('pv_alertas').insert([
    {tipo:'caso_nuevo',nivel:prob?.urgencia_auto==='emergencia'?'rojo':'amarillo',titulo:'🚨 '+(prob?.nombre||'Nuevo reporte')+' — '+U.nombre,mensaje:tk(nc.numero_caso)+' · Urgencia: '+(prob?.urgencia_auto||'programable'),caso_id:nc.id,para_rol:'postventa'},
    {tipo:'caso_nuevo',nivel:'amarillo',titulo:'📋 Nueva orden: '+(prob?.nombre||'Reporte'),mensaje:tk(nc.numero_caso)+' disponible para tomar',caso_id:nc.id,para_rol:'civil'}
  ]);

  // Close modal
  cm();

  // Show success mega alert
  megaAlert('¡Solicitud recibida!','Tu ticket es '+tk(nc.numero_caso)+'. Ya nos ponemos a trabajar para solucionarlo.','info','Entendido');

  // FIX: Fetch the specific new case by ID (avoids cache issues)
  await new Promise(r=>setTimeout(r,500)); // Small delay for DB commit
  const freshCase=await fetchCaseById(nc.id);
  if(freshCase){
    D.casos.unshift(freshCase);
    console.log('New case added manually. Total cases:',D.casos.length);
  }
  // Also do a full background reload after 2s to sync everything
  setTimeout(async()=>{
    const{data:allCases}=await SB.from('pv_casos').select(_CASES_Q).order('created_at',{ascending:false}).limit(200);
    if(allCases&&allCases.length>0){D.casos=allCases;console.log('Background sync done. Cases:',D.casos.length)}
  },2000);
  go('mis_rep');
}

/* ═══ MODAL ═══ */
function cm(){$('mdl').style.display='none';document.body.style.overflow=''}
document.addEventListener('keydown',e=>{if(e.key==='Escape')cm()});

/* ═══ INIT ON LOAD ═══ */
window.addEventListener('DOMContentLoaded',()=>{
  const saved=sessionStorage.getItem('pv_u');
  if(saved){
    try{U=JSON.parse(saved);initApp()}
    catch(e){sessionStorage.removeItem('pv_u')}
  }
});
</script>
