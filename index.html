<script>
const SU='https://keasjfgcjkskvdcudoml.supabase.co',SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtlYXNqZmdjamtza3ZkY3Vkb21sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MjIwNDQsImV4cCI6MjA4OTE5ODA0NH0.BfZy552V_WaYITcqWazQaIUHEBAtXA5tJiN_GPWRegw',CN='dfelsbmbo',CP='fichas_unsigned';

let cfR=null;function cfShow(i,t,m){return new Promise(r=>{$('cfi').textContent=i;$('cft').textContent=t;$('cfm').textContent=m;$('cfdlg').style.display='flex';cfR=r;$('cfok').onclick=()=>{$('cfdlg').style.display='none';r(true)}})}function cfX(){$('cfdlg').style.display='none';if(cfR)cfR(false)}

async function hashP(p){const d=new TextEncoder().encode(p+'HOUSE_CRM_SALT_2026'),b=await crypto.subtle.digest('SHA-256',d);return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('')}
async function hashF(f){const b=await f.arrayBuffer(),h=await crypto.subtle.digest('SHA-256',b);return Array.from(new Uint8Array(h)).map(x=>x.toString(16).padStart(2,'0')).join('')}
function mega(tit,msg,type='info',btn='Entendido'){if(navigator.vibrate)navigator.vibrate([300,100,300,100,300,100,600]);try{const ac=new(window.AudioContext||window.webkitAudioContext)(),o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.frequency.value=type==='emer'?880:660;g.gain.value=0.3;o.start();setTimeout(()=>o.frequency.value=1100,200);setTimeout(()=>o.stop(),700)}catch(e){}const el=document.createElement('div');el.className='mega '+type;el.innerHTML=`<div class="megab"><div class="megai">${type==='emer'?'🚨':type==='urge'?'⚠️':'📩'}</div><div class="megat">${tit}</div><div class="megam">${msg}</div><button class="megabt ${type}" onclick="this.closest('.mega').remove()">${btn}</button></div>`;$('megas').appendChild(el)}
async function upCl(file){const fd=new FormData();fd.append('file',file);fd.append('upload_preset',CP);fd.append('folder','postventa');const res=await fetch('https://api.cloudinary.com/v1_1/'+CN+'/auto/upload',{method:'POST',body:fd});const d=await res.json();if(d.secure_url)return{url:d.secure_url,thumb:d.secure_url.replace('/upload/','/upload/w_400,c_fill,f_auto/')};throw new Error(d.error?.message||'Error')}
async function getGPS(){return new Promise(r=>{if(!navigator.geolocation)return r({lat:null,lng:null});navigator.geolocation.getCurrentPosition(p=>r({lat:p.coords.latitude,lng:p.coords.longitude}),()=>r({lat:null,lng:null}),{timeout:5000})})}

// Find inquilino linked to current user - robust matching
function myInq(){const i=D.inqs;if(!i.length)return null;return i.find(x=>x.telefono_principal===U.telefono)||(U.email?i.find(x=>x.email===U.email):null)||(i.find(x=>x.nombre===U.nombre.split(' ')[0]))||null}

/* AUTH */
async function login(){const usr=($('lin_usr').value||'').trim().toLowerCase(),pwd=($('lin_pwd').value||'').trim();if(!usr||!pwd){$('lerr').textContent='Ingresa usuario y contraseña';$('lerr').style.display='block';return}$('lin_btn').disabled=true;$('lerr').style.display='none';try{const h=await hashP(pwd);const{data:u}=await SB.from('pv_usuarios').select('*').eq('usuario',usr).eq('activo',true).single();if(!u||u.password_hash!==h){$('lerr').textContent='Datos incorrectos';$('lerr').style.display='block'}else{U={id:u.id,nombre:u.nombre,rol:u.rol,usuario:u.usuario,telefono:u.telefono,email:u.email};sessionStorage.setItem('pv_u',JSON.stringify(U));initApp()}}catch(e){$('lerr').textContent='Error de conexión';$('lerr').style.display='block'}$('lin_btn').disabled=false}
function logout(){sessionStorage.removeItem('pv_u');location.reload()}
function initApp(){$('lov').style.display='none';$('mhdr').style.display='block';$('uname').textContent=U.nombre;$('muname').textContent=U.nombre;$('murole').textContent=U.rol.toUpperCase();if(localStorage.getItem('pv_th')==='d'){document.body.classList.add('dark');$('tbtn').textContent='🌙'}bMenu();bSec();loadData()}
function tTh(){const d=document.body.classList.toggle('dark');localStorage.setItem('pv_th',d?'d':'l');$('tbtn').textContent=d?'🌙':'☀️'}

/* POLLING */
function startPoll(){if(_poll)clearInterval(_poll);_poll=setInterval(async()=>{try{const{data}=await SB.from('pv_alertas').select('id,titulo,mensaje,nivel,caso_id,leida,created_at').order('created_at',{ascending:false}).limit(20);if(!data)return;D.als=data;const cnt=data.filter(a=>!a.leida).length;$('bBdg').textContent=cnt;$('bBdg').style.display=cnt>0?'flex':'none';if(cnt>_alc&&_alc>=0){const n=data.filter(a=>!a.leida)[0];if(n)mega(n.titulo,n.mensaje||'',n.nivel==='rojo'?'emer':n.nivel==='amarillo'?'urge':'info')}_alc=cnt}catch(e){}},15000)}

/* BELL */
function togBell(){$('bDD').classList.toggle('show');rBell()}
document.addEventListener('click',e=>{if(!e.target.closest('.bell-w'))$('bDD').classList.remove('show')});
function rBell(){const el=$('bList');if(!D.als.length){el.innerHTML='<div style="padding:20px;text-align:center;color:var(--sub);font-size:11px">Sin notificaciones</div>';return}el.innerHTML=D.als.slice(0,10).map(a=>`<div class="bell-it" onclick="bellClick('${a.caso_id||''}')"><div class="bt2">${a.titulo}</div><div class="bd2">${a.mensaje||''}</div><div class="bf">${a.created_at?new Date(a.created_at).toLocaleString('es-CO',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}):''}</div></div>`).join('')}
function bellClick(casoId){$('bDD').classList.remove('show');if(!casoId)return;if(U.rol==='administrador'||U.rol==='postventa'){openC(casoId)}else if(U.rol==='civil'){go('mis_trabajos')}else{go('mis_rep')}}

function bMenu(){let h='';const R=U.rol;if(R==='administrador')h=mi('dash','📊','Dashboard')+mi('casos','🎫','Casos')+mi('propiedades','🏠','Propiedades')+mi('inquilinos','👤','Inquilinos')+mi('profesionales','🔧','Profesionales')+mi('propietarios','🏦','Propietarios')+'<div class="mdv"></div>'+mi('usuarios','👥','Usuarios');else if(R==='postventa')h=mi('dash','📊','Dashboard')+mi('casos','🎫','Casos')+mi('profesionales','🔧','Civiles');else if(R==='civil')h=mi('mis_trabajos','🔧','Mis trabajos')+mi('mi_hist','📋','Historial');else h=mi('mi_inm','🏠','Mi inmueble')+mi('mis_rep','📋','Mis reportes');$('mnu').innerHTML=h}
function mi(s,i,l){return`<button class="mi" data-s="${s}" onclick="go('${s}')"><span class="mic">${i}</span>${l}</button>`}

function omenu(){$('mov').classList.add('op');$('mpnl').classList.add('op')}

function ren(s){({dash:rDash,casos:rCasos,propiedades:rProps,inquilinos:rInqs,profesionales:rProfs,propietarios:rOwners,usuarios:rUsers,mis_trabajos:rCivil,mi_hist:rCivHist,mi_inm:rClient,mis_rep:rClientRep}[s]||function(){})()}

/* LOAD DATA */
async function loadData(){
  try{const[c1,c2,c3,c4,c5,c6,c7,c8]=await Promise.all([

    SB.from('pv_inquilinos').select('*,propiedad:pv_propiedades(id,tipo,direccion,ciudad,codigo_interno)').eq('activo',true),
    SB.from('pv_profesionales').select('*').eq('activo',true).order('nombre'),

async function reload(){
  const[c1,c2,c3,c4,c5,c8]=await Promise.all([
    SB.from('pv_casos').select('*,propiedad:pv_propiedades(id,tipo,direccion,ciudad,barrio,codigo_interno,torre,piso),inquilino:pv_inquilinos(id,nombre,apellido,telefono_principal,email),profesional:pv_profesionales(id,nombre,apellido,telefono_principal,especialidades,rating_promedio,usuario_id),categoria:pv_categorias(id,nombre,icono),problema:pv_problemas(id,nombre,urgencia_auto,sla_horas,alerta_seguridad)').order('created_at',{ascending:false}),

/* ═══ CHAT RENDERER (shared) ═══ */
function chatHTML(msgs,canal,casoId){
  const qrs=canal==='servicio'?['¿Hay mascota?','¿Parqueadero?','Voy a necesitar repuesto']:['¿Cuánto demora?','Reprogramar','Gracias'];
  const uid=canal+'_'+casoId.substring(0,8);
  let h=`<div class="chb">`;
  if(!msgs.length)h+=`<div style="text-align:center;color:var(--g400);font-size:9px;padding:8px">Sin mensajes</div>`;
  msgs.forEach(m=>{const cl=m.autor_tipo==='sistema'?'sys':m.autor_tipo==='inquilino'?'inq':m.autor_tipo==='profesional'?'prof r':'adm r';h+=`<div class="chm ${cl}"><div class="chbb">${m.mensaje}</div><div class="chmeta">${m.autor_nombre} · ${new Date(m.created_at).toLocaleString('es-CO',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}</div></div>`});
  h+=`</div><div class="qrw">${qrs.map(q=>`<span class="qr" onclick="document.getElementById('ci_${uid}').value='${q}'">${q}</span>`).join('')}</div>`;
  h+=`<div class="chinp"><textarea id="ci_${uid}" placeholder="Mensaje..."></textarea><button class="bt bsm bp" onclick="sendChat('${casoId}','${canal}','ci_${uid}')">→</button></div>`;
  return h;
}
async function sendChat(casoId,canal,inputId){
  const inp=$(inputId);if(!inp)return;const t=inp.value.trim();if(!t)return;
  const tipo=U.rol==='usuario'?'inquilino':U.rol==='civil'?'profesional':'admin';
  const{error}=await SB.from('pv_mensajes').insert({caso_id:casoId,autor_tipo:tipo,autor_id:U.id,autor_nombre:U.nombre,mensaje:t,canal:canal});
  if(error){toast('Error enviando','terr');console.error(error);return}
  inp.value='';toast('Enviado');
  // Re-render current view
  const R=U.rol;if(R==='administrador'||R==='postventa')openC(casoId);else if(R==='civil')rCivil();else{await reload();rClient();rClientRep()}
}

el.innerHTML=h;
// Load chats for active cases
mc.forEach(async c=>{const{data:ms}=await SB.from('pv_mensajes').select('*').eq('caso_id',c.id).order('created_at');const msSrv=(ms||[]).filter(m=>m.canal!=='administrativo'),msAdm=(ms||[]).filter(m=>m.canal==='administrativo');const ch=$('cch_'+c.id);if(ch)ch.innerHTML=`<div class="tabs"><button class="tab act" onclick="$('chs_${c.id}').style.display='block';$('cha_${c.id}').style.display='none';this.classList.add('act');this.nextElementSibling.classList.remove('act')">Chat técnico (${msSrv.length})</button><button class="tab" onclick="$('cha_${c.id}').style.display='block';$('chs_${c.id}').style.display='none';this.classList.add('act');this.previousElementSibling.classList.remove('act')">Inmobiliaria (${msAdm.length})</button></div><div id="chs_${c.id}">${chatHTML(msSrv,'servicio',c.id)}</div><div id="cha_${c.id}" style="display:none">${chatHTML(msAdm,'administrativo',c.id)}</div>`})}

function buildExp(c,open){const ex=EX[c.estado]||{};const steps=['reportado','validado','asignado','en_camino','en_ejecucion','completado','cerrado'],ci=steps.indexOf(c.estado);
let tl='<div class="prg">';steps.forEach((s,i)=>{const e=EX[s]||{};const cls=i<ci?'done':i===ci?'active':'future';let ts='';if(i<=ci){const t=c[s+'_at']||c.created_at;if(t)ts=new Date(t).toLocaleString('es-CO',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}let reas='';if(s==='asignado'&&c.reasignaciones>0)reas=`<div style="margin:2px 0;padding:3px 5px;background:var(--goldbg);border:1px solid var(--yb);border-radius:4px;font-size:8px;color:#92400e">⚠️ Reasignado${c.motivo_reasignacion?' — '+c.motivo_reasignacion:''}</div>`;tl+=`<div class="prgs ${cls}"><div class="prgd">${e.i||'○'}</div><div class="prgi"><div class="prgt">${e.t||s}</div>${i<=ci?`<div class="prgds">${e.d||''}</div>`:''}<div class="prgtm">${ts}</div>${reas}</div></div>`});tl+='</div>';
let prof='';if(c.profesional)prof=`<div style="margin-top:6px;padding:6px;background:var(--greenbg);border:1px solid var(--gb);border-radius:6px;font-size:10px">🔧 <b>${c.profesional.nombre}</b> · ⭐ ${c.profesional.rating_promedio}</div>`;
let rate='';if(c.estado==='completado'&&!c.calificacion_inquilino)rate=`<div style="text-align:center;padding:10px;background:var(--goldbg);border:1px solid var(--yb);border-radius:7px;margin-top:6px"><div style="font-size:11px;font-weight:800;margin-bottom:4px">⭐ Califica</div><div style="display:flex;justify-content:center;gap:8px">${[1,2,3,4,5].map(n=>`<button style="font-size:24px;background:none;border:none;cursor:pointer" onclick="cRate('${c.id}',${n})">⭐</button>`).join('')}</div></div>`;
if(c.calificacion_inquilino)rate=`<div style="text-align:center;font-size:11px;color:var(--green);font-weight:700;margin-top:4px">${'⭐'.repeat(c.calificacion_inquilino)}</div>`;
return`<div class="exp" id="ec_${c.id}"><div class="exph" onclick="togExp('${c.id}')"><span style="font-size:18px">${ex.i||'📩'}</span><div style="flex:1"><div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap"><span class="tkn">${tk(c.numero_caso)}</span>${uB(c.urgencia)}</div><div style="font-size:12px;font-weight:700;margin-top:2px">${ex.t||c.estado}</div><div style="font-size:9px;color:var(--sub)">${c.categoria?.icono||''} ${c.problema?.nombre||''}</div></div><span class="expa ${open?'open':''}">›</span></div><div class="expb ${open?'show':''}">${tl}${prof}${rate}<div style="margin-top:8px" id="cch_${c.id}"><div style="color:var(--g400);font-size:9px">Cargando chat...</div></div></div></div>`}
function togExp(id){const b=document.querySelector('#ec_'+id+' .expb'),a=document.querySelector('#ec_'+id+' .expa');if(b)b.classList.toggle('show');if(a)a.classList.toggle('open')}

function rClientRep(){const el=$('sec-mis_rep');if(!el)return;const mI=myInq();if(!mI){el.innerHTML='<div class="emp"><h3>Sin reportes</h3></div>';return}const todos=D.casos.filter(c=>c.inquilino_id===mI.id);
let h=`<div style="font-family:Fraunces,serif;font-size:14px;font-weight:700;margin-bottom:8px">Mis reportes (${todos.length})</div>`;
if(!todos.length){el.innerHTML=h+'<div class="emp"><h3>Aún no has reportado nada</h3><p>Usa el botón de reporte en Mi inmueble</p></div>';return}
todos.forEach((c,i)=>h+=buildExp(c,i===0));el.innerHTML=h;
todos.forEach(async c=>{const{data:ms}=await SB.from('pv_mensajes').select('*').eq('caso_id',c.id).order('created_at');const msSrv=(ms||[]).filter(m=>m.canal!=='administrativo'),msAdm=(ms||[]).filter(m=>m.canal==='administrativo');const ch=$('cch_'+c.id);if(ch)ch.innerHTML=`<div class="tabs"><button class="tab act" onclick="$('chs_${c.id}').style.display='block';$('cha_${c.id}').style.display='none';this.classList.add('act');this.nextElementSibling.classList.remove('act')">Técnico (${msSrv.length})</button><button class="tab" onclick="$('cha_${c.id}').style.display='block';$('chs_${c.id}').style.display='none';this.classList.add('act');this.previousElementSibling.classList.remove('act')">Inmobiliaria (${msAdm.length})</button></div><div id="chs_${c.id}">${chatHTML(msSrv,'servicio',c.id)}</div><div id="cha_${c.id}" style="display:none">${chatHTML(msAdm,'administrativo',c.id)}</div>`})}
async function cRate(id,n){await SB.from('pv_casos').update({calificacion_inquilino:n}).eq('id',id);toast('⭐ Gracias');await reload();rClient()}

/* CLIENT REPORT */
function cReport(iId,pId){$('mtt').textContent='Reportar problema';$('msb3').textContent='Cuéntanos qué pasó';_pf=[];
let b=`<div class="ff"><label class="ffl">¿Qué se dañó? <span class="ffr">*</span></label><select class="ffi" id="cr_c" onchange="crCat()"><option value="">Seleccionar...</option>${D.cats.map(c=>`<option value="${c.id}">${c.icono} ${c.nombre}</option>`).join('')}</select></div>`;
b+=`<div class="ff"><label class="ffl">Problema específico</label><select class="ffi" id="cr_p" onchange="crProb()"><option value="">Primero selecciona arriba</option></select></div>`;
b+=`<div id="crAlert"></div><div id="crGuide"></div>`;
b+=`<div class="ff"><label class="ffl">Describe el problema <span class="ffr">*</span></label><textarea class="ffi" id="cr_d" style="min-height:60px" placeholder="Explica qué pasó, desde cuándo..."></textarea></div>`;
b+=`<div class="ff"><label class="ffl">¿Dónde exactamente?</label><input class="ffi" id="cr_u" placeholder="Baño principal, cocina..."></div>`;
b+=`<div class="ff"><label class="ffl">📷 Fotos y videos del daño</label><div class="fzone" onclick="$('crFinp').click()"><div class="fzi">📷</div><div class="fzt">Toca para agregar fotos</div><div class="fzs">JPG, PNG, MP4 · Máx 10MB</div></div><input type="file" id="crFinp" multiple accept="image/*,video/*" style="display:none" onchange="crUp(this.files)"><div class="fprog" id="crFprog"><span style="width:0%"></span></div><div class="fprev" id="crFprev"></div></div>`;
b+=`<button class="bt bp" style="width:100%;padding:11px;font-size:13px" onclick="crSave('${iId}','${pId}')">📩 Enviar reporte</button>`;
$('mbd').innerHTML=b;$('mdl').style.display='flex';document.body.style.overflow='hidden'}

function crCat(){const cid=$('cr_c').value;$('cr_p').innerHTML='<option value="">Seleccionar...</option>'+D.probs.filter(p=>p.categoria_id===cid).map(p=>`<option value="${p.id}">${p.nombre}</option>`).join('');
const g=FG[cid]||FG.otro;$('crGuide').innerHTML=`<div class="fg"><div class="fgt">📷 Guía: qué fotografiar</div>${g.items.map((it,i)=>`<div class="fgi"><span class="fgn">${i+1}</span><span>${it}</span></div>`).join('')}<div class="fgtip">💡 ${g.tip}</div></div>`}
function crProb(){const p=D.probs.find(x=>x.id===$('cr_p').value);if(p?.alerta_seguridad)$('crAlert').innerHTML=`<div style="padding:8px;background:var(--redbg);border:2px solid var(--rb);border-radius:7px;margin-bottom:8px;font-size:10px;color:var(--red);font-weight:700">🚨 ${p.alerta_seguridad}</div>`;else $('crAlert').innerHTML=''}
async function crUp(files){const prog=$('crFprog'),prev=$('crFprev');prog.style.display='block';const gps=await getGPS();for(let i=0;i<files.length;i++){prog.querySelector('span').style.width=Math.round((i+1)/files.length*100)+'%';try{const hash=await hashF(files[i]);const res=await upCl(files[i]);_pf.push({...res,hash,lat:gps.lat,lng:gps.lng});const d=document.createElement('div');d.className='fpi';d.innerHTML=`<img src="${res.thumb}"><button class="fx" onclick="this.parentElement.remove()">✕</button>`;prev.appendChild(d)}catch(e){toast('Error: '+files[i].name,'terr')}}setTimeout(()=>{prog.style.display='none';prog.querySelector('span').style.width='0%'},800);if(_pf.length)toast('📷 '+_pf.length+' subidos')}

async function crSave(iId,pId){
  const cId=$('cr_c').value,prId=$('cr_p').value,d=$('cr_d').value.trim();
  if(!cId){return toast('Selecciona qué se dañó','twarn')}
  if(!d){return toast('Describe el problema','twarn')}
  const prob=D.probs.find(p=>p.id===prId);
  console.log('Saving case:',{pId,iId,cId,prId,d,urgencia:prob?.urgencia_auto});
  const{data:nc,error}=await SB.from('pv_casos').insert({propiedad_id:pId,inquilino_id:iId,categoria_id:cId,problema_id:prId||null,descripcion:d,urgencia:prob?prob.urgencia_auto:'programable',ubicacion_especifica:$('cr_u').value||null,reportado_por:U.id}).select().single();
  if(error){console.error('Save error:',error);toast('Error: '+error.message,'terr');return}
  console.log('Case saved:',nc);
  // Save photos
  for(const f of _pf){await SB.from('pv_evidencias').insert({caso_id:nc.id,tipo:'reporte',url:f.url,url_thumb:f.thumb,hash_sha256:f.hash,gps_lat:f.lat,gps_lng:f.lng,subido_por:'inquilino'})}_pf=[];
  // Alert admin/postventa
  await SB.from('pv_alertas').insert({tipo:'caso_nuevo',nivel:prob?.urgencia_auto==='emergencia'?'rojo':'amarillo',titulo:'🚨 '+(prob?.nombre||'Reporte')+' — '+U.nombre,mensaje:'Caso '+tk(nc.numero_caso)+'. Urgencia: '+(prob?.urgencia_auto||'programable'),caso_id:nc.id,de_usuario_id:U.id,para_rol:'postventa'});
  cm();
  mega('¡Solicitud recibida!','Tu ticket es '+tk(nc.numero_caso)+'. Ya nos ponemos a trabajar.','info','Entendido');
  // Reload and navigate to mis reportes
  await reload();
  go('mis_rep');
}

function cm(){$('mdl').style.display='none';document.body.style.overflow=''}
document.addEventListener('keydown',e=>{if(e.key==='Escape')cm()});
document.addEventListener('click',e=>{if(!e.target.closest('.bell-w'))$('bDD').classList.remove('show')});
window.addEventListener('DOMContentLoaded',()=>{const c=sessionStorage.getItem('pv_u');if(c){try{U=JSON.parse(c);initApp()}catch(e){sessionStorage.removeItem('pv_u')}}});
</script>
